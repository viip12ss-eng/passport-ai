<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000">
<title>Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}

/* SCANNER */
#page-scan{position:fixed;inset:0;display:flex;flex-direction:column}

/* الكانفاس يملأ الشاشة — الفيديو يُرسم عليه مباشرة */
#canvas-live{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

#bar-top{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:calc(env(safe-area-inset-top,44px)+8px) 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
}
.btn-round{
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.btn-round.flash-on{background:rgba(255,210,0,.4);border-color:rgba(255,210,0,.7)}

#lbl-status{
  position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  padding:10px 26px;border-radius:26px;white-space:nowrap;z-index:20;
  background:rgba(0,0,0,.7);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);
  font-size:14px;font-weight:600;pointer-events:none;transition:all .3s;
}
#lbl-status.found{
  background:rgba(0,122,255,.4);
  border-color:rgba(0,122,255,.8);
  color:#c8e0ff;
}

#bar-bot{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  padding:18px 36px calc(env(safe-area-inset-bottom,34px)+14px);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}
#btn-capture{
  width:76px;height:76px;border-radius:50%;
  border:5px solid rgba(255,255,255,.4);background:#fff;
  cursor:pointer;position:relative;flex-shrink:0;
  transition:all .25s;
}
#btn-capture::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  background:#fff;transition:all .25s;
}
#btn-capture:active{transform:scale(.9)}
#btn-capture.found{
  border-color:rgba(0,122,255,.8);
  box-shadow:0 0 0 6px rgba(0,122,255,.25),0 0 32px rgba(0,122,255,.5);
}
#btn-capture.found::after{background:#007AFF}

#btn-gallery{
  width:52px;height:52px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
#img-thumb{width:100%;height:100%;object-fit:cover;display:none}

#flash-fx{
  position:fixed;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:99;
  transition:opacity .07s;
}

/* REVIEW */
#page-review{position:fixed;inset:0;background:#0a0a0a;display:none;flex-direction:column}
#rev-head{
  padding:calc(env(safe-area-inset-top,44px)+8px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.btn-action{
  padding:9px 20px;border-radius:22px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
}
#btn-retake{background:rgba(255,255,255,.12);color:#fff}
#btn-send{background:#007AFF;color:#fff}
#rev-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
#img-result{
  max-width:100%;max-height:100%;
  border-radius:16px;object-fit:contain;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
}
#rev-foot{
  padding:10px 20px calc(env(safe-area-inset-bottom,34px)+10px);
  text-align:center;font-size:13px;color:rgba(255,255,255,.4);flex-shrink:0;
}

/* SENDING */
#page-send{
  position:fixed;inset:0;background:rgba(0,0,0,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:200;
}
.big-icon{font-size:52px}
.big-title{font-size:20px;font-weight:800}
.small-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;padding:0 28px}
.prog-track{width:220px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#007AFF,#5856D6);border-radius:2px;transition:width .4s ease}

/* SUCCESS */
#page-success{
  position:fixed;inset:0;background:rgba(0,0,0,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;gap:10px;z-index:200;
}
.result-card{
  width:100%;max-width:360px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:16px;display:grid;gap:10px;
}
.result-row{display:flex;justify-content:space-between;gap:10px}
.result-label{font-size:12px;color:rgba(255,255,255,.4);flex-shrink:0}
.result-value{font-size:13px;font-weight:600;text-align:left}
.btn-newscan{
  margin-top:8px;padding:14px 44px;border-radius:28px;
  background:#007AFF;border:none;color:#fff;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
}

/* ERROR */
#page-error{
  position:fixed;inset:0;background:rgba(0,0,0,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;gap:14px;z-index:200;
}
.btn-retry{
  padding:13px 38px;border-radius:24px;background:#ff3b30;
  border:none;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

input[type=file]{display:none}
</style>
</head>
<body>
<div id="flash-fx"></div>

<!-- ═══ SCANNER ═══ -->
<div id="page-scan">
  <canvas id="canvas-live"></canvas>
  <div id="bar-top">
    <button class="btn-round" onclick="goBack()">✕</button>
    <span style="font-size:16px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9)">مسح ضوئي</span>
    <button class="btn-round" id="btn-flash" onclick="toggleFlash()">⚡</button>
  </div>
  <div id="lbl-status">جاري تحميل الماسح...</div>
  <div id="bar-bot">
    <div id="btn-gallery" onclick="document.getElementById('file-input').click()">
      <img id="img-thumb" alt=""><span id="ico-gallery">🖼</span>
    </div>
    <button id="btn-capture" onclick="manualCapture()"></button>
    <button class="btn-round" style="width:44px;height:44px;font-size:19px" onclick="flipCamera()">↺</button>
  </div>
</div>

<!-- ═══ REVIEW ═══ -->
<div id="page-review">
  <div id="rev-head">
    <button class="btn-action" id="btn-retake" onclick="retake()">إعادة</button>
    <span style="font-size:16px;font-weight:600">الوثيقة المقصوصة</span>
    <button class="btn-action" id="btn-send" onclick="sendImage()">إرسال ✓</button>
  </div>
  <div id="rev-wrap"><img id="img-result" alt=""></div>
  <div id="rev-foot">✂️ تم قص الوثيقة وتقويمها تلقائياً</div>
</div>

<!-- ═══ SENDING ═══ -->
<div id="page-send">
  <div class="big-icon">🔬</div>
  <div class="big-title">جاري الاستخراج...</div>
  <div class="small-sub" id="send-msg">يتم تحليل الجواز</div>
  <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
</div>

<!-- ═══ SUCCESS ═══ -->
<div id="page-success">
  <div class="big-icon">✅</div>
  <div class="big-title" style="color:#30d158">تم الاستخراج!</div>
  <div class="small-sub">تم إرسال البيانات للكمبيوتر</div>
  <div class="result-card" id="result-card"></div>
  <button class="btn-newscan" onclick="newScan()">📷 مسح جواز جديد</button>
</div>

<!-- ═══ ERROR ═══ -->
<div id="page-error">
  <div class="big-icon">❌</div>
  <div class="big-title" style="color:#ff3b30">فشل الاستخراج</div>
  <div class="small-sub" id="error-msg">حدث خطأ</div>
  <button class="btn-retry" onclick="retake()">حاول مجدداً</button>
</div>

<input type="file" id="file-input" accept="image/*">

<!-- OpenCV ثم jscanify — بالترتيب الصحيح -->
<script src="https://docs.opencv.org/4.7.0/opencv.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>

<script>
'use strict';

// ─── إعدادات ───
const N8N = localStorage.getItem('pai_webhook') || 'https://mmnnm19991.app.n8n.cloud/webhook/passport-extract';
const SID = (() => {
  let id = localStorage.getItem('pai_sid');
  if (!id) { id = 'u' + Math.random().toString(36).slice(2,9); localStorage.setItem('pai_sid', id); }
  return id;
})();

// ─── مراجع العناصر ───
const El = new Proxy({}, { get: (_, id) => document.getElementById(id) });

// ─── الحالة ───
let mediaStream = null;
let videoTrack  = null;
let flashOn     = false;
let facingMode  = 'environment';

let capturedBlob = null;
let capturedUrl  = null;

let scanner  = null;
let cvReady  = false;
let loopId   = null;

// ─── متغيرات الاستقرار (مثل WeScan RectangleFeaturesFunnel) ───
let stableFrames    = 0;
const STABLE_NEEDED = 10;   // 10 إطار ثابت = ~1 ثانية
let noRectFrames    = 0;
const NO_RECT_MAX   = 4;    // 4 إطار بدون كشف = إعادة ضبط
let didAutoCapture  = false;

// ─── الفيديو (مخفي — نقرأ منه فقط) ───
const videoEl = document.createElement('video');
videoEl.autoplay = true;
videoEl.playsInline = true;
videoEl.muted = true;

// ─── كانفاس مؤقت للمعالجة ───
const procCanvas = document.createElement('canvas');
const procCtx    = procCanvas.getContext('2d');

// ─── انتظار تحميل المكتبتين ───
function waitForLibs() {
  const t = setInterval(() => {
    if (typeof cv !== 'undefined' && cv.Mat && typeof jscanify !== 'undefined') {
      clearInterval(t);
      try {
        scanner = new jscanify();
        cvReady = true;
        setStatus('وجّه الكاميرا نحو الوثيقة', false);
      } catch(e) { console.error('jscanify init:', e); }
    }
  }, 250);
}

// ════════════════════════════════
//  الكاميرا
// ════════════════════════════════
async function startCamera() {
  try {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: facingMode },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false,
    });

    videoEl.srcObject = mediaStream;
    videoTrack = mediaStream.getVideoTracks()[0];
    await videoEl.play();

    resizeCanvas();
    startDetectionLoop();
  } catch(e) {
    setStatus('لا يمكن الوصول للكاميرا', false);
  }
}

function stopCamera() {
  stopDetectionLoop();
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
    videoTrack  = null;
  }
}

function resizeCanvas() {
  const lc = El['canvas-live'];
  const wrap = El['page-scan'];
  lc.width  = wrap.offsetWidth;
  lc.height = wrap.offsetHeight;
}

// ════════════════════════════════
//  حلقة الكشف — بالطريقة الموثقة في jscanify
//  canvasCtx.drawImage(video, 0, 0);
//  const result = scanner.highlightPaper(canvas);
//  resultCtx.drawImage(result, 0, 0);
// ════════════════════════════════
function startDetectionLoop() {
  stopDetectionLoop();
  const liveCanvas = El['canvas-live'];
  const liveCtx    = liveCanvas.getContext('2d');

  loopId = setInterval(() => {
    if (!videoEl.videoWidth || !cvReady || !scanner) return;

    // ضبط أبعاد الكانفاسات
    liveCanvas.width  = El['page-scan'].offsetWidth;
    liveCanvas.height = El['page-scan'].offsetHeight;
    procCanvas.width  = liveCanvas.width;
    procCanvas.height = liveCanvas.height;

    // ارسم الفيديو على كانفاس المعالجة
    procCtx.drawImage(videoEl, 0, 0, procCanvas.width, procCanvas.height);

    // jscanify: highlightPaper يكشف الوثيقة ويرسم الإطار
    let result = null;
    try { result = scanner.highlightPaper(procCanvas); } catch(e) {}

    if (result) {
      // ✅ كُشفت وثيقة — اعرض الإطار
      liveCtx.drawImage(result, 0, 0, liveCanvas.width, liveCanvas.height);
      noRectFrames = 0;
      stableFrames++;

      const progress = Math.min(stableFrames / STABLE_NEEDED, 1);
      drawProgressRing(liveCtx, liveCanvas.width, liveCanvas.height, progress);

      El['btn-capture'].className = 'found';
      setStatus('◉ وثيقة مكتشفة...', true);

      if (stableFrames >= STABLE_NEEDED && !didAutoCapture) {
        didAutoCapture = true;
        setStatus('✅ جاري الالتقاط', true);
        setTimeout(() => autoCapture(), 100);
      }

    } else {
      // ❌ لا توجد وثيقة
      liveCtx.drawImage(procCanvas, 0, 0); // اعرض الفيديو العادي
      noRectFrames++;

      if (noRectFrames >= NO_RECT_MAX) {
        stableFrames   = 0;
        didAutoCapture = false;
        El['btn-capture'].className = '';
        setStatus('وجّه الكاميرا نحو الوثيقة', false);
      }
    }
  }, 80); // ~12 fps
}

function stopDetectionLoop() {
  if (loopId) { clearInterval(loopId); loopId = null; }
}

// ─── دائرة التقدم ───
function drawProgressRing(ctx, w, h, p) {
  if (p <= 0) return;
  const cx = w / 2, cy = h / 2, r = 32;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p);
  ctx.strokeStyle = p >= 1 ? '#34C759' : '#007AFF';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// ════════════════════════════════
//  الالتقاط
// ════════════════════════════════
function autoCapture() {
  stopDetectionLoop();
  performCapture();
}

function manualCapture() {
  stopDetectionLoop();
  performCapture();
}

function performCapture() {
  // بريق الالتقاط
  El['flash-fx'].style.opacity = '1';
  setTimeout(() => El['flash-fx'].style.opacity = '0', 80);

  // التقط بالدقة الكاملة للفيديو
  const fullCanvas = document.createElement('canvas');
  fullCanvas.width  = videoEl.videoWidth  || 1280;
  fullCanvas.height = videoEl.videoHeight || 720;
  fullCanvas.getContext('2d').drawImage(videoEl, 0, 0, fullCanvas.width, fullCanvas.height);

  // jscanify: extractPaper يقص الوثيقة ويقوّمها
  let croppedCanvas = null;
  try {
    // احسب نسبة الجواز (1.42 للجوازات الدولية)
    const outW = Math.min(fullCanvas.width, 1600);
    const outH = Math.round(outW / 1.42);
    croppedCanvas = scanner.extractPaper(fullCanvas, outW, outH);
  } catch(e) {
    console.log('extractPaper failed:', e);
  }

  const finalCanvas = (croppedCanvas && croppedCanvas.width > 100) ? croppedCanvas : fullCanvas;

  // تحسين الصورة
  enhanceImage(finalCanvas);

  capturedUrl = finalCanvas.toDataURL('image/jpeg', 0.95);
  finalCanvas.toBlob(blob => {
    capturedBlob = blob;
    showReview();
  }, 'image/jpeg', 0.95);
}

function enhanceImage(canvas) {
  const ctx = canvas.getContext('2d');
  const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < d.data.length; i += 4) {
    d.data[i]   = clamp(((d.data[i]   - 128) * 1.15) + 132);
    d.data[i+1] = clamp(((d.data[i+1] - 128) * 1.15) + 132);
    d.data[i+2] = clamp(((d.data[i+2] - 128) * 1.15) + 132);
  }
  ctx.putImageData(d, 0, 0);
}
const clamp = v => Math.min(255, Math.max(0, Math.round(v)));

// ════════════════════════════════
//  المراجعة
// ════════════════════════════════
function showReview() {
  stopCamera();
  El['img-result'].src = capturedUrl;
  El['page-scan'].style.display   = 'none';
  El['page-review'].style.display = 'flex';
}

function retake() {
  capturedBlob = null;
  capturedUrl  = null;
  ['page-review','page-send','page-success','page-error'].forEach(id => El[id].style.display = 'none');
  El['page-scan'].style.display = '';
  stableFrames = 0; noRectFrames = 0; didAutoCapture = false;
  El['btn-capture'].className = '';
  startCamera();
}

// ════════════════════════════════
//  الإرسال
// ════════════════════════════════
async function sendImage() {
  if (!capturedBlob) return;
  El['page-review'].style.display = 'none';
  El['page-send'].style.display   = 'flex';
  setProgress(15); setSendMsg('جاري الإرسال...');

  try {
    setProgress(35);
    const fd = new FormData();
    fd.append('data', capturedBlob, 'passport.jpg');
    fd.append('_sid', SID);

    const res = await fetch(N8N, { method: 'POST', body: fd });
    setProgress(70); setSendMsg('جاري قراءة البيانات...');

    const txt = await res.text();
    let data = null;
    try { data = JSON.parse(txt); } catch {
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) try { data = JSON.parse(m[0]); } catch {}
    }

    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (!data)  throw new Error('لم يرجع بيانات');
    if (Array.isArray(data)) data = data[0] || {};
    if (data.data && typeof data.data === 'object') data = data.data;

    setProgress(100); setSendMsg('تم!');
    setTimeout(() => showSuccess(data), 350);

  } catch(e) {
    El['page-send'].style.display = 'none';
    El['error-msg'].textContent = e.message || 'خطأ غير متوقع';
    El['page-error'].style.display = 'flex';
  }
}

const setProgress = p => El['prog-bar'].style.width = p + '%';
const setSendMsg  = m => El['send-msg'].textContent = m;

function showSuccess(d) {
  El['page-send'].style.display = 'none';
  const fields = [
    ['الاسم',       d.nameEnglish],
    ['رقم الجواز',  d.passportNumber || d.passportNo],
    ['الجنسية',     d.nationalityArabic],
    ['الميلاد',     d.dateOfBirth],
    ['الإصدار',     d.dateOfIssue],
    ['الانتهاء',    d.dateOfExpiry],
  ].filter(([, v]) => v && v !== 'null');

  El['result-card'].innerHTML = fields.map(([l, v]) =>
    `<div class="result-row">
      <span class="result-label">${l}</span>
      <span class="result-value">${v}</span>
    </div>`
  ).join('');
  El['page-success'].style.display = 'flex';
}

function newScan() {
  El['page-success'].style.display = 'none';
  El['page-scan'].style.display    = '';
  capturedBlob = null; capturedUrl = null;
  stableFrames = 0; noRectFrames = 0; didAutoCapture = false;
  startCamera();
}

// ════════════════════════════════
//  مساعدات
// ════════════════════════════════
function setStatus(text, found) {
  const el = El['lbl-status'];
  el.textContent = text;
  el.className   = found ? 'found' : '';
}

async function toggleFlash() {
  if (!videoTrack) return;
  flashOn = !flashOn;
  try {
    await videoTrack.applyConstraints({ advanced: [{ torch: flashOn }] });
    El['btn-flash'].className = 'btn-round' + (flashOn ? ' flash-on' : '');
  } catch { El['btn-flash'].style.opacity = '.4'; }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  stopCamera();
  stableFrames = 0; noRectFrames = 0; didAutoCapture = false;
  await startCamera();
}

function goBack() {
  stopCamera();
  if (window.history.length > 1) window.history.back();
  else window.location.href = 'index.html';
}

// ─── رفع من الاستوديو ───
El['file-input'].addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      // عرض الصورة في زر الاستوديو
      El['img-thumb'].src = reader.result;
      El['img-thumb'].style.display = 'block';
      El['ico-gallery'].style.display = 'none';

      // قص باستخدام jscanify
      const s = Math.min(1, 2200 / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width  = Math.round(img.width  * s);
      c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);

      let finalCanvas = c;
      if (cvReady && scanner) {
        try {
          const outW = Math.min(c.width, 1600);
          const outH = Math.round(outW / 1.42);
          const cropped = scanner.extractPaper(c, outW, outH);
          if (cropped && cropped.width > 100) finalCanvas = cropped;
        } catch(e) {}
      }

      enhanceImage(finalCanvas);
      capturedUrl = finalCanvas.toDataURL('image/jpeg', 0.95);
      finalCanvas.toBlob(blob => {
        capturedBlob = blob;
        El['img-result'].src = capturedUrl;
        showReview();
      }, 'image/jpeg', 0.95);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

window.addEventListener('resize', resizeCanvas);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopCamera();
  } else if (El['page-scan'].style.display !== 'none') {
    stableFrames = 0; noRectFrames = 0; didAutoCapture = false;
    startCamera();
  }
});

// ─── ابدأ ───
waitForLibs();
startCamera();
</script>
</body>
</html>
