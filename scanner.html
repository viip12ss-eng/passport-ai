<html lang="ar">
<head>

<!-- OpenCV.js — المكتبة الرئيسية -->
<script src="https://docs.opencv.org/4.7.0/opencv.js" async></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}

#scanView{position:fixed;inset:0;display:flex;flex-direction:column}
#vWrap{position:relative;flex:1;overflow:hidden;background:#000}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* الكانفاس الخفي للمعالجة */
#procCanvas{display:none}

/* الكانفاس الظاهر للعرض */
#dispCanvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}

/* TopBar */
#topBar{
  position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,44px) + 6px) 16px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
}
.tBtn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,20,20,.7);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.tBtn.on{background:rgba(255,213,0,.4);border-color:rgba(255,213,0,.7)}
#topTitle{font-size:16px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9)}

/* Pill */
#pill{
  position:absolute;bottom:118px;left:50%;transform:translateX(-50%);
  padding:9px 22px;border-radius:22px;white-space:nowrap;z-index:30;
  background:rgba(0,0,0,.65);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);
  font-size:14px;font-weight:500;pointer-events:none;
  transition:all .25s;
}
#pill.found{background:rgba(0,122,255,.35);border-color:rgba(0,122,255,.7);color:#aad4ff}
#pill.loading{color:rgba(255,255,255,.5)}

/* BottomBar */
#botBar{
  padding:14px 28px calc(env(safe-area-inset-bottom,34px)+10px);
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#capBtn{
  width:76px;height:76px;border-radius:50%;
  border:5px solid rgba(255,255,255,.4);background:#fff;
  cursor:pointer;position:relative;flex-shrink:0;transition:transform .1s,box-shadow .2s;
}
#capBtn::after{content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.08);transition:background .2s}
#capBtn:active{transform:scale(.91)}
#capBtn.rdy{border-color:rgba(0,122,255,.7);box-shadow:0 0 0 5px rgba(0,122,255,.25),0 0 28px rgba(0,122,255,.45)}
#capBtn.rdy::after{background:#007AFF}
#galBtn{
  width:54px;height:54px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:23px;
}
#galImg{width:100%;height:100%;object-fit:cover;display:none}
#flipBtn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#flashFx{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .07s}

/* REVIEW */
#rvView{position:fixed;inset:0;background:#111;display:none;flex-direction:column}
#rvHead{padding:calc(env(safe-area-inset-top,44px)+8px) 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rvBtn{padding:9px 20px;border-radius:22px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
#rvRetake{background:rgba(255,255,255,.12);color:#fff}
#rvSend{background:#007AFF;color:#fff}
#rvTitle{font-size:17px;font-weight:600}
#rvWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden}
#rvImg{max-width:100%;max-height:100%;border-radius:16px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#rvFoot{padding:12px 20px calc(env(safe-area-inset-bottom,34px)+12px);text-align:center;font-size:13px;color:rgba(255,255,255,.4);flex-shrink:0}

/* SENDING */
#sndView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200}
.sI{font-size:52px}.sT{font-size:20px;font-weight:700}.sS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;padding:0 28px}
.pT{width:220px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pF{height:100%;background:linear-gradient(90deg,#007AFF,#5856D6);border-radius:2px;transition:width .4s ease}

/* SUCCESS */
#sucView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:10px;z-index:200}
.scI{font-size:60px}.scT{font-size:22px;font-weight:800;color:#30d158}.scS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:8px}
.rc{width:100%;max-width:360px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;display:grid;gap:10px}
.rr{display:flex;justify-content:space-between;align-items:center;gap:10px}
.rl{font-size:12px;color:rgba(255,255,255,.4);flex-shrink:0}.rv{font-size:13px;font-weight:600;text-align:left}
.nb{margin-top:8px;padding:14px 44px;border-radius:28px;background:#007AFF;border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}

/* ERROR */
#errView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px;z-index:200}
.eI{font-size:52px}.eT{font-size:20px;font-weight:700;color:#ff3b30}.eS{font-size:13px;color:rgba(255,255,255,.5);text-align:center}
.retryB{padding:13px 38px;border-radius:24px;background:#ff3b30;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="flashFx"></div>

<!-- SCANNER -->
<div id="scanView">
  <div id="vWrap">
    <video id="vid" autoplay playsinline muted></video>

      <button class="tBtn" id="closeBtn" onclick="goBack()">✕</button>

<input type="file" id="gin" accept="image/*">

<!-- jscanify — مكتبة الكشف عن الوثائق (تستخدم OpenCV) -->
<script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>

<script>
'use strict';
const N8N = localStorage.getItem('pai_webhook') || 'https://mmnnm19991.app.n8n.cloud/webhook/passport-extract';
const SID = (()=>{ let id=localStorage.getItem('pai_sid'); if(!id){id='u'+Math.random().toString(36).slice(2,9);localStorage.setItem('pai_sid',id);} return id; })();
const $=id=>document.getElementById(id);

let stream=null, vtrack=null, flashOn=false, facing='environment';
let blob_=null, url_=null;
let rafId=null, stable=0, autoFired=false;
let scanner=null, cvReady=false;

// انتظر تحميل OpenCV
function onOpenCvReady(){
  cvReady=true;
  scanner=new jscanify();
  setPill('ضع الجواز أمام الكاميرا',false);
  console.log('OpenCV + jscanify ready');
}

// OpenCV يستدعي هذه الدالة عند الجهوز
window['Module']={onRuntimeInitialized:function(){
  // jscanify تحتاج cv object
  setTimeout(onOpenCvReady,500);
}};

// ── الكاميرا ──
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1920},height:{ideal:1080}},audio:false
    });
    const v=$('vid');
    v.srcObject=stream;
    vtrack=stream.getVideoTracks()[0];
    await v.play();
    onResize();
    loop();
  }catch(e){setPill('لا يمكن الوصول للكاميرا',false);}
}

function stopCam(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;vtrack=null;}
}

function onResize(){
  const dc=$('dispCanvas'),w=$('vWrap');
  dc.width=w.offsetWidth;dc.height=w.offsetHeight;
  const pc=$('procCanvas');
  pc.width=w.offsetWidth;pc.height=w.offsetHeight;
}

// ── حلقة الكشف باستخدام jscanify ──
let lastPts=null;
function loop(){
  rafId=requestAnimationFrame(loop);
  const v=$('vid');
  if(!v.videoWidth||!cvReady||!scanner)return;

  // ارسم الفيديو على كانفاس المعالجة
  const pc=$('procCanvas');
  const pctx=pc.getContext('2d');
  pctx.drawImage(v,0,0,pc.width,pc.height);

  // استخدم jscanify للكشف عن الوثيقة
  let highlighted;
  try{
    highlighted=scanner.highlightPaper(pc);
  }catch(e){
    drawGuide();
    return;
  }

  // استخرج نقاط الزوايا من النتيجة
  const pts=getCornerPoints(pc);

  const dc=$('dispCanvas');
  const dctx=dc.getContext('2d');
  dctx.clearRect(0,0,dc.width,dc.height);

  if(pts){
    lastPts=pts;
    drawDocOverlay(dctx,pts,dc.width,dc.height);
    setPill('✅ تم اكتشاف الجواز',true);
    $('capBtn').classList.add('rdy');
    stable++;
    if(stable>=18&&!autoFired){autoFired=true;capture();}
  }else{
    lastPts=null;
    drawGuide();
    setPill('ضع الجواز أمام الكاميرا',false);
    $('capBtn').classList.remove('rdy');
    stable=0;
  }
}

// استخراج نقاط الزوايا من jscanify مباشرة
function getCornerPoints(canvas){
  if(!cvReady||!scanner)return null;
  try{
    // jscanify يكشف أكبر مضلع رباعي الأضلاع في الصورة
    const src=cv.imread(canvas);
    const gray=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);

    // blur
    const blurred=new cv.Mat();
    const ksize=new cv.Size(5,5);
    cv.GaussianBlur(gray,blurred,ksize,0);

    // Canny
    const edges=new cv.Mat();
    cv.Canny(blurred,edges,75,200);

    // dilate
    const dilated=new cv.Mat();
    const kernel=cv.Mat.ones(5,5,cv.CV_8U);
    cv.dilate(edges,dilated,kernel);

    // contours
    const contours=new cv.MatVector();
    const hierarchy=new cv.Mat();
    cv.findContours(dilated,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

    let maxArea=0, bestContour=null;
    for(let i=0;i<contours.size();i++){
      const c=contours.get(i);
      const area=cv.contourArea(c);
      if(area>maxArea){maxArea=area;bestContour=c;}
    }

    let pts=null;
    if(bestContour&&maxArea>canvas.width*canvas.height*0.05){
      const peri=cv.arcLength(bestContour,true);
      const approx=new cv.Mat();
      cv.approxPolyDP(bestContour,approx,0.02*peri,true);

      if(approx.rows===4){
        const p=[];
        for(let i=0;i<4;i++){
          p.push({x:approx.data32S[i*2],y:approx.data32S[i*2+1]});
        }
        // رتّب الزوايا: أعلى يسار، أعلى يمين، أسفل يمين، أسفل يسار
        pts=sortCorners(p);
      }
      approx.delete();
    }

    src.delete();gray.delete();blurred.delete();edges.delete();dilated.delete();
    kernel.delete();contours.delete();hierarchy.delete();
    if(bestContour)bestContour.delete();

    return pts;
  }catch(e){return null;}
}

// ترتيب الزوايا الأربع
function sortCorners(pts){
  const cx=pts.reduce((s,p)=>s+p.x,0)/4;
  const cy=pts.reduce((s,p)=>s+p.y,0)/4;
  const tl=pts.filter(p=>p.x<cx&&p.y<cy)[0]||pts[0];
  const tr=pts.filter(p=>p.x>cx&&p.y<cy)[0]||pts[1];
  const br=pts.filter(p=>p.x>cx&&p.y>cy)[0]||pts[2];
  const bl=pts.filter(p=>p.x<cx&&p.y>cy)[0]||pts[3];
  if(!tl||!tr||!br||!bl)return null;
  return [tl,tr,br,bl];
}

// ── رسم الإطار (مثل Apple Notes) ──
function drawDocOverlay(ctx,pts,cw,ch){
  const [tl,tr,br,bl]=pts;

  // تعتيم خارج الوثيقة
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,cw,ch);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // تعبئة زرقاء شفافة (مثل Notes)
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.fillStyle='rgba(0,122,255,0.13)';
  ctx.fill();

  // حدود
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.strokeStyle='rgba(0,122,255,0.92)';
  ctx.lineWidth=2.5;ctx.lineJoin='round';
  ctx.stroke();

  // زوايا مميزة
  const L=24;
  ctx.strokeStyle='#007AFF';ctx.lineWidth=4;ctx.lineCap='round';
  function corner(a,b,c){
    const d1=Math.hypot(b.x-a.x,b.y-a.y)||1;
    const d2=Math.hypot(c.x-b.x,c.y-b.y)||1;
    ctx.beginPath();
    ctx.moveTo(b.x+(a.x-b.x)/d1*L,b.y+(a.y-b.y)/d1*L);
    ctx.lineTo(b.x,b.y);
    ctx.lineTo(b.x+(c.x-b.x)/d2*L,b.y+(c.y-b.y)/d2*L);
    ctx.stroke();
  }
  corner(bl,tl,tr);corner(tl,tr,br);corner(tr,br,bl);corner(br,bl,tl);

  // نقاط الزوايا
  [tl,tr,br,bl].forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fillStyle='#007AFF';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,122,255,0.38)';ctx.lineWidth=2;ctx.stroke();
  });
}

function drawGuide(){
  const dc=$('dispCanvas');
  const ctx=dc.getContext('2d');
  ctx.clearRect(0,0,dc.width,dc.height);
  const w=dc.width,h=dc.height;
  const mx=w*.08,my=h*.22,gw=w*.84,gh=h*.55,L=26;
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.setLineDash([7,5]);
  ctx.strokeRect(mx,my,gw,gh);ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3.5;ctx.lineCap='round';
  [[mx,my,1,0,0,1],[mx+gw,my,-1,0,0,1],[mx,my+gh,1,0,0,-1],[mx+gw,my+gh,-1,0,0,-1]].forEach(([x,y,a,b,c,d])=>{
    ctx.beginPath();ctx.moveTo(x+a*L,y);ctx.lineTo(x,y);ctx.lineTo(x,y+d*L);ctx.stroke();
  });
}

// ── الالتقاط ──
function capture(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const v=$('vid');
  $('flashFx').style.opacity='1';
  setTimeout(()=>$('flashFx').style.opacity='0',80);
  const c=document.createElement('canvas');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||720;
  const ctx=c.getContext('2d');
  ctx.drawImage(v,0,0,c.width,c.height);
  enhance(ctx,c.width,c.height);
  url_=c.toDataURL('image/jpeg',.95);
  c.toBlob(b=>{blob_=b;showReview();},'image/jpeg',.95);
}

function enhance(ctx,w,h){
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){
    d.data[i]=cl(((d.data[i]-128)*1.15)+132);
    d.data[i+1]=cl(((d.data[i+1]-128)*1.15)+132);
    d.data[i+2]=cl(((d.data[i+2]-128)*1.15)+132);
  }
  ctx.putImageData(d,0,0);
}
const cl=v=>Math.min(255,Math.max(0,Math.round(v)));

// ── REVIEW ──
function showReview(){
  stopCam();
  $('rvImg').src=url_;
  $('scanView').style.display='none';
  $('rvView').style.display='flex';
}
function retake(){
  blob_=null;url_=null;
  ['rvView','sndView','sucView','errView'].forEach(id=>$(id).style.display='none');
  $('scanView').style.display='flex';
  stable=0;autoFired=false;lastPts=null;
  $('capBtn').classList.remove('rdy');
  startCam();
}

// ── SEND ──
async function sendImg(){
  if(!blob_)return;
  $('rvView').style.display='none';
  $('sndView').style.display='flex';
  prog(15);sMsg('جاري تجهيز الصورة...');
  try{
    prog(35);sMsg('جاري الإرسال...');
    const fd=new FormData();
    fd.append('data',blob_,'passport-scan.jpg');
    fd.append('_sid',SID);
    const res=await fetch(N8N,{method:'POST',body:fd});
    prog(70);sMsg('جاري قراءة البيانات...');
    const txt=await res.text();
    let json=null;
    try{json=JSON.parse(txt);}catch{const m=txt.match(/\{[\s\S]*\}/);if(m)try{json=JSON.parse(m[0]);}catch{}}
    if(!res.ok)throw new Error('HTTP '+res.status);
    if(!json)throw new Error('لم يرجع بيانات');
    if(Array.isArray(json))json=json[0]||{};
    if(json.data&&typeof json.data==='object')json=json.data;
    prog(100);sMsg('تم!');
    setTimeout(()=>showSuc(json),350);
  }catch(e){
    $('sndView').style.display='none';
    $('errMsg').textContent=e.message||'خطأ';
    $('errView').style.display='flex';
  }
}
const prog=p=>$('pFll').style.width=p+'%';
const sMsg=m=>$('sndMsg').textContent=m;

function showSuc(d){
  $('sndView').style.display='none';
  const F=[['الاسم',d.nameEnglish],['رقم الجواز',d.passportNumber||d.passportNo],
    ['الجنسية',d.nationalityArabic],['الميلاد',d.dateOfBirth],
    ['الإصدار',d.dateOfIssue],['الانتهاء',d.dateOfExpiry]
  ].filter(([,v])=>v&&v!=='null');
  $('resCard').innerHTML=F.map(([l,v])=>
    `<div class="rr"><span class="rl">${l}</span><span class="rv">${v}</span></div>`).join('');
  $('sucView').style.display='flex';
}

function newScan(){
  $('sucView').style.display='none';
  $('scanView').style.display='flex';
  blob_=null;url_=null;stable=0;autoFired=false;lastPts=null;
  startCam();
}

const setPill=(t,ok)=>{const p=$('pill');p.textContent=t;p.className=ok?'found':''};

async function toggleFlash(){
  if(!vtrack)return;flashOn=!flashOn;
  try{await vtrack.applyConstraints({advanced:[{torch:flashOn}]});
    $('flashBtn').className='tBtn'+(flashOn?' on':'');}
  catch{$('flashBtn').style.opacity='.4';}
}

async function flipCam(){
  facing=facing==='environment'?'user':'environment';
  stopCam();stable=0;autoFired=false;lastPts=null;
  await startCam();
}

function goBack(){stopCam();if(window.history.length>1)window.history.back();else window.location.href='index.html';}

// GALLERY
$('gin').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const s=Math.min(1,2200/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);
      enhance(ctx,c.width,c.height);
      $('galImg').src=rd.result;$('galImg').style.display='block';$('galIco').style.display='none';
      c.toBlob(b=>{blob_=b;url_=c.toDataURL('image/jpeg',.95);$('rvImg').src=url_;showReview();},'image/jpeg',.95);
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);e.target.value='';
});

window.addEventListener('resize',onResize);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)stopCam();
  else if($('scanView').style.display!=='none'){stable=0;autoFired=false;startCam();}
});

startCam();
</script>
