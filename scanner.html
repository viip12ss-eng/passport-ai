<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000">
<title>Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}

/* SCANNER */
#scanView{position:fixed;inset:0;display:flex;flex-direction:column}
#vWrap{position:relative;flex:1;overflow:hidden;background:#000}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

/* الكانفاس الذي يعرض الفيديو + الإطار */
#scanCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

#topBar{position:absolute;top:0;left:0;right:0;z-index:20;
  padding:calc(env(safe-area-inset-top,44px)+8px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent)}
.tBtn{width:40px;height:40px;border-radius:50%;background:rgba(20,20,20,.7);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.tBtn.on{background:rgba(255,210,0,.4)}
#topLbl{font-size:16px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9)}

#pill{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
  padding:9px 22px;border-radius:22px;white-space:nowrap;z-index:20;
  background:rgba(0,0,0,.65);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);font-size:14px;font-weight:500;
  pointer-events:none;transition:all .3s}
#pill.ok{background:rgba(0,122,255,.35);border-color:rgba(0,122,255,.7);color:#aad4ff}

#botBar{padding:14px 28px calc(env(safe-area-inset-bottom,34px)+10px);
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#capBtn{width:76px;height:76px;border-radius:50%;border:5px solid rgba(255,255,255,.4);
  background:#fff;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s}
#capBtn::after{content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;transition:background .2s}
#capBtn:active{transform:scale(.91)}
#capBtn.rdy{border-color:rgba(0,122,255,.8);box-shadow:0 0 0 5px rgba(0,122,255,.3),0 0 30px rgba(0,122,255,.5)}
#capBtn.rdy::after{background:#007AFF}
#galBtn{width:54px;height:54px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px}
#galImg{width:100%;height:100%;object-fit:cover;display:none}
#flipBtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}

#flashFx{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .07s}

/* REVIEW */
#rvView{position:fixed;inset:0;background:#0a0a0a;display:none;flex-direction:column}
#rvHead{padding:calc(env(safe-area-inset-top,44px)+8px) 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rvB{padding:9px 20px;border-radius:22px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
#rvRtk{background:rgba(255,255,255,.12);color:#fff}
#rvSnd{background:#007AFF;color:#fff}
#rvTtl{font-size:17px;font-weight:600}
#rvWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden}
#rvImg{max-width:100%;max-height:100%;border-radius:14px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#rvFoot{padding:10px 20px calc(env(safe-area-inset-bottom,34px)+10px);text-align:center;font-size:13px;color:rgba(255,255,255,.4);flex-shrink:0}

/* SENDING */
#sndView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200}
.sI{font-size:52px}.sT{font-size:20px;font-weight:700}
.sS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;padding:0 28px}
.pT{width:220px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pF{height:100%;background:linear-gradient(90deg,#007AFF,#5856D6);border-radius:2px;transition:width .4s ease}

/* SUCCESS */
#sucView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:10px;z-index:200}
.scI{font-size:60px}.scT{font-size:22px;font-weight:800;color:#30d158}
.scS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:8px}
.rc{width:100%;max-width:360px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;display:grid;gap:10px}
.rr{display:flex;justify-content:space-between;gap:10px}
.rl{font-size:12px;color:rgba(255,255,255,.4);flex-shrink:0}
.rv{font-size:13px;font-weight:600;text-align:left}
.nb{margin-top:8px;padding:14px 44px;border-radius:28px;background:#007AFF;border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}

/* ERROR */
#errView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px;z-index:200}
.eI{font-size:52px}.eT{font-size:20px;font-weight:700;color:#ff3b30}
.eS{font-size:13px;color:rgba(255,255,255,.5);text-align:center}
.rtB{padding:13px 38px;border-radius:24px;background:#ff3b30;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="flashFx"></div>

<div id="scanView">
  <div id="vWrap">
    <video id="vid" autoplay playsinline muted></video>
    <!-- كانفاس يعرض الفيديو + الإطار الأزرق -->
    <canvas id="scanCanvas"></canvas>
    <div id="topBar">
      <button class="tBtn" id="closeBtn" onclick="goBack()">✕</button>
      <div id="topLbl">مسح ضوئي</div>
      <button class="tBtn" id="flashBtn" onclick="toggleFlash()">⚡</button>
    </div>
    <div id="pill">جاري تحضير الماسح...</div>
  </div>
  <div id="botBar">
    <div id="galBtn" onclick="document.getElementById('gin').click()">
      <img id="galImg" alt=""><span id="galIco">🖼</span>
    </div>
    <button id="capBtn" onclick="doCapture()"></button>
    <button id="flipBtn" onclick="flipCam()">↺</button>
  </div>
</div>

<div id="rvView">
  <div id="rvHead">
    <button class="rvB" id="rvRtk" onclick="retake()">إعادة</button>
    <div id="rvTtl">الجواز المقصوص</div>
    <button class="rvB" id="rvSnd" onclick="sendImg()">إرسال ✓</button>
  </div>
  <div id="rvWrap"><img id="rvImg" alt=""></div>
  <div id="rvFoot">✂️ تم قص الجواز وتقويمه</div>
</div>

<div id="sndView">
  <div class="sI">🔬</div>
  <div class="sT">جاري الاستخراج...</div>
  <div class="sS" id="sndMsg">يتم تحليل صورة الجواز</div>
  <div class="pT"><div class="pF" id="pFll" style="width:0%"></div></div>
</div>

<div id="sucView">
  <div class="scI">✅</div>
  <div class="scT">تم الاستخراج!</div>
  <div class="scS">تم إرسال البيانات للكمبيوتر</div>
  <div class="rc" id="resCard"></div>
  <button class="nb" onclick="newScan()">📷 مسح جواز جديد</button>
</div>

<div id="errView">
  <div class="eI">❌</div>
  <div class="eT">فشل الاستخراج</div>
  <div class="eS" id="errMsg">حدث خطأ</div>
  <button class="rtB" onclick="retake()">حاول مجدداً</button>
</div>

<input type="file" id="gin" accept="image/*">

<!-- OpenCV أولاً، ثم jscanify -->
<script src="https://docs.opencv.org/4.7.0/opencv.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>

<script>
'use strict';
const N8N = localStorage.getItem('pai_webhook')||'https://mmnnm19991.app.n8n.cloud/webhook/passport-extract';
const SID = (()=>{let id=localStorage.getItem('pai_sid');if(!id){id='u'+Math.random().toString(36).slice(2,9);localStorage.setItem('pai_sid',id);}return id;})();
const $=id=>document.getElementById(id);

let stream=null,vtrack=null,flashOn=false,facing='environment';
let croppedBlob=null,croppedUrl=null;
let scanner=null,cvReady=false;
let stable=0,autoFired=false;
let intervalId=null;

// انتظر جهوز OpenCV وjscanify
function waitForLibs(){
  const check=()=>{
    if(typeof cv!=='undefined' && cv.imread && typeof jscanify!=='undefined'){
      try{
        scanner=new jscanify();
        cvReady=true;
        setPill('ضع الجواز أمام الكاميرا',false);
      }catch(e){setTimeout(check,300);}
    }else{
      setTimeout(check,300);
    }
  };
  check();
}

// ══ الكاميرا ══
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    const v=$('vid');
    v.srcObject=stream;
    vtrack=stream.getVideoTracks()[0];
    await v.play();
    onResize();
    startLoop();
  }catch(e){
    setPill('لا يمكن الوصول للكاميرا',false);
  }
}

function stopCam(){
  if(intervalId){clearInterval(intervalId);intervalId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;vtrack=null;}
}

function onResize(){
  const c=$('scanCanvas'),w=$('vWrap');
  c.width=w.offsetWidth;
  c.height=w.offsetHeight;
}

// ══ حلقة الكشف الاحترافية ══
// يعمل بـ 3 مراحل:
// 1. لا يكتشف شيء → دليل مساعد
// 2. يكتشف جواز → يرسم الإطار ويبدأ العداد
// 3. 2.5 ثانية ثبات كامل → يلتقط ويقص

const STABLE_NEEDED = 25; // 2.5 ثانية عند 100ms
let lastCorners = null;

function startLoop(){
  if(intervalId)clearInterval(intervalId);
  intervalId=setInterval(()=>{
    const v=$('vid');
    if(!v.videoWidth||!cvReady||!scanner)return;
    const c=$('scanCanvas');
    const ctx=c.getContext('2d');
    ctx.drawImage(v,0,0,c.width,c.height);

    let corners = null;
    try{ corners = getDocCorners(c); }catch(e){}

    if(corners && isGoodDoc(corners,c.width,c.height)){
      // تحقق من الاستقرار — هل الجواز تحرّك كثيراً؟
      if(lastCorners && didMove(corners,lastCorners)){
        stable = Math.max(0, stable - 3); // خصم إذا تحرّك
      }
      lastCorners = corners;
      stable = Math.min(stable + 1, STABLE_NEEDED);

      const progress = stable / STABLE_NEEDED;
      drawDocFrame(ctx, corners, progress);
      drawProgressRing(ctx, c.width, c.height, progress);

      if(stable < STABLE_NEEDED){
        const secs = (((STABLE_NEEDED - stable) * 100) / 1000).toFixed(1);
        setPill(`ثابّت الكاميرا ${secs}s ⏱`, true);
        $('capBtn').classList.add('rdy');
      } else if(!autoFired){
        autoFired = true;
        setPill('✅ جاري الالتقاط...', true);
        setTimeout(doCapture, 200);
      }
    } else {
      // لم يجد جواز — أعد العداد ببطء
      stable = Math.max(0, stable - 2);
      lastCorners = null;
      $('capBtn').classList.remove('rdy');
      drawGuideFrame(ctx, c.width, c.height);
      if(stable === 0){
        setPill('ضع الجواز أمام الكاميرا', false);
      }
    }
  },100);
}

function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

// استخرج زوايا الجواز بـ OpenCV
function getDocCorners(canvas){
  let src,gray,blr,edg,dil,k,cnts,hier,best;
  try{
    src=cv.imread(canvas);
    gray=new cv.Mat(); cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    blr=new cv.Mat(); cv.GaussianBlur(gray,blr,new cv.Size(5,5),0);
    edg=new cv.Mat(); cv.Canny(blr,edg,50,150);
    dil=new cv.Mat(); k=cv.Mat.ones(5,5,cv.CV_8U); cv.dilate(edg,dil,k);
    cnts=new cv.MatVector(); hier=new cv.Mat();
    cv.findContours(dil,cnts,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);
    let maxA=0; best=null;
    for(let i=0;i<cnts.size();i++){
      const c=cnts.get(i);
      const a=cv.contourArea(c);
      const p=cv.arcLength(c,true);
      const ap=new cv.Mat();
      cv.approxPolyDP(c,ap,0.02*p,true);
      if(ap.rows===4&&a>maxA&&a>canvas.width*canvas.height*0.05){
        maxA=a; if(best)best.delete(); best=ap.clone();
      }
      ap.delete(); c.delete();
    }
    if(!best)return null;
    const pts=[];
    for(let i=0;i<4;i++) pts.push({x:best.data32S[i*2],y:best.data32S[i*2+1]});
    return sortQ(pts);
  }finally{
    [src,gray,blr,edg,dil,k,cnts,hier,best].forEach(m=>{try{if(m)m.delete();}catch{}});
  }
}

function sortQ(pts){
  const cx=pts.reduce((s,p)=>s+p.x,0)/4;
  const cy=pts.reduce((s,p)=>s+p.y,0)/4;
  const tl=pts.find(p=>p.x<=cx&&p.y<=cy);
  const tr=pts.find(p=>p.x> cx&&p.y<=cy);
  const br=pts.find(p=>p.x> cx&&p.y> cy);
  const bl=pts.find(p=>p.x<=cx&&p.y> cy);
  if(!tl||!tr||!br||!bl)return null;
  return [tl,tr,br,bl];
}

// هل الجواز بحجم وشكل منطقي؟
function isGoodDoc(pts,cw,ch){
  const [tl,tr,br,bl]=pts;
  const W=(dist(tl,tr)+dist(bl,br))/2;
  const H=(dist(tl,bl)+dist(tr,br))/2;
  if(W*H < cw*ch*0.08) return false; // صغير جداً
  const ratio=W/H;
  return ratio>0.5 && ratio<4; // نسبة منطقية
}

// هل تحرّك الجواز؟
function didMove(a,b){
  for(let i=0;i<4;i++) if(dist(a[i],b[i])>20) return true;
  return false;
}

// رسم الإطار — اللون يتغير من أزرق لأخضر بالتقدم
function drawDocFrame(ctx,pts,progress){
  const [tl,tr,br,bl]=pts;
  const g=Math.round(122+(211-122)*progress);
  const b=Math.round(255+(0-255)*progress);
  const color=`rgb(0,${g},${b})`;

  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.48)';
  ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();ctx.fill();
  ctx.restore();

  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.fillStyle=`rgba(0,${g},${b},${0.1+progress*0.1})`;ctx.fill();

  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.strokeStyle=color;ctx.lineWidth=2.5+progress;ctx.lineJoin='round';ctx.stroke();

  const L=22+progress*8;
  ctx.strokeStyle=color;ctx.lineWidth=4;ctx.lineCap='round';
  function corner(a,b2,c){
    const d1=dist(b2,a)||1,d2=dist(b2,c)||1;
    ctx.beginPath();
    ctx.moveTo(b2.x+(a.x-b2.x)/d1*L,b2.y+(a.y-b2.y)/d1*L);
    ctx.lineTo(b2.x,b2.y);
    ctx.lineTo(b2.x+(c.x-b2.x)/d2*L,b2.y+(c.y-b2.y)/d2*L);
    ctx.stroke();
  }
  corner(bl,tl,tr);corner(tl,tr,br);corner(tr,br,bl);corner(br,bl,tl);
  [tl,tr,br,bl].forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  });
}

// دائرة التقدم المركزية
function drawProgressRing(ctx,w,h,progress){
  if(progress<=0)return;
  const cx=w/2,cy=h/2,r=34;
  const g=Math.round(122+(211-122)*progress);
  const b=Math.round(255+(0-255)*progress);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fill();
  ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*Math.min(progress,1));
  ctx.strokeStyle=`rgb(0,${g},${b})`;ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.5;ctx.stroke();
}

// دليل مساعد
function drawGuideFrame(ctx,w,h){
  const mx=w*.08,my=h*.22,gw=w*.84,gh=h*.55,L=26;
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1.5;ctx.setLineDash([7,5]);
  ctx.strokeRect(mx,my,gw,gh);ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=3.5;ctx.lineCap='round';
  [[mx,my,1,1],[mx+gw,my,-1,1],[mx,my+gh,1,-1],[mx+gw,my+gh,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(x+dx*L,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*L);ctx.stroke();
  });
}

// ══ الالتقاط + القص ══
function doCapture(){
  if(intervalId){clearInterval(intervalId);intervalId=null;}
  const v=$('vid');

  // بريق
  $('flashFx').style.opacity='1';
  setTimeout(()=>$('flashFx').style.opacity='0',80);

  // التقط الصورة الكاملة بالدقة الأصلية
  const full=document.createElement('canvas');
  full.width=v.videoWidth||1280;
  full.height=v.videoHeight||720;
  full.getContext('2d').drawImage(v,0,0,full.width,full.height);

  // jscanify: اقص الورقة فقط وقوّمها (perspective correction)
  try{
    // extractPaper: يقص الورقة ويقوّمها تلقائياً
    const ratio=full.width/full.height;
    const outW=Math.min(full.width,1600);
    const outH=Math.round(outW/ratio);

    const cropped=scanner.extractPaper(full,outW,outH);

    if(cropped&&cropped.width>50&&cropped.height>50){
      // تحسين الصورة
      enhance(cropped.getContext('2d'),cropped.width,cropped.height);
      croppedUrl=cropped.toDataURL('image/jpeg',.95);
      cropped.toBlob(b=>{croppedBlob=b;showReview();},'image/jpeg',.95);
      return;
    }
  }catch(e){
    console.log('extractPaper failed, using full image:',e);
  }

  // fallback: إذا فشل القص أرسل الصورة الكاملة
  enhance(full.getContext('2d'),full.width,full.height);
  croppedUrl=full.toDataURL('image/jpeg',.95);
  full.toBlob(b=>{croppedBlob=b;showReview();},'image/jpeg',.95);
}

function enhance(ctx,w,h){
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){
    d.data[i]=cl(((d.data[i]-128)*1.18)+132);
    d.data[i+1]=cl(((d.data[i+1]-128)*1.18)+132);
    d.data[i+2]=cl(((d.data[i+2]-128)*1.18)+132);
  }
  ctx.putImageData(d,0,0);
}
const cl=v=>Math.min(255,Math.max(0,Math.round(v)));

// ══ REVIEW ══
function showReview(){
  stopCam();
  $('rvImg').src=croppedUrl;
  $('scanView').style.display='none';
  $('rvView').style.display='flex';
}

function retake(){
  croppedBlob=null;croppedUrl=null;
  ['rvView','sndView','sucView','errView'].forEach(id=>$(id).style.display='none');
  $('scanView').style.display='flex';
  stable=0;autoFired=false;
  $('capBtn').classList.remove('rdy');
  startCam();
}

// ══ SEND ══
async function sendImg(){
  if(!croppedBlob)return;
  $('rvView').style.display='none';
  $('sndView').style.display='flex';
  prog(15);sMsg('جاري إرسال الجواز...');
  try{
    prog(35);
    const fd=new FormData();
    fd.append('data',croppedBlob,'passport-cropped.jpg');
    fd.append('_sid',SID);
    const res=await fetch(N8N,{method:'POST',body:fd});
    prog(70);sMsg('جاري قراءة البيانات...');
    const txt=await res.text();
    let json=null;
    try{json=JSON.parse(txt);}catch{const m=txt.match(/\{[\s\S]*\}/);if(m)try{json=JSON.parse(m[0]);}catch{}}
    if(!res.ok)throw new Error('HTTP '+res.status);
    if(!json)throw new Error('لم يرجع بيانات');
    if(Array.isArray(json))json=json[0]||{};
    if(json.data&&typeof json.data==='object')json=json.data;
    prog(100);sMsg('تم!');
    setTimeout(()=>showSuc(json),350);
  }catch(e){
    $('sndView').style.display='none';
    $('errMsg').textContent=e.message||'خطأ';
    $('errView').style.display='flex';
  }
}
const prog=p=>$('pFll').style.width=p+'%';
const sMsg=m=>$('sndMsg').textContent=m;

function showSuc(d){
  $('sndView').style.display='none';
  const F=[
    ['الاسم',d.nameEnglish],
    ['رقم الجواز',d.passportNumber||d.passportNo],
    ['الجنسية',d.nationalityArabic],
    ['الميلاد',d.dateOfBirth],
    ['الإصدار',d.dateOfIssue],
    ['الانتهاء',d.dateOfExpiry]
  ].filter(([,v])=>v&&v!=='null');
  $('resCard').innerHTML=F.map(([l,v])=>
    `<div class="rr"><span class="rl">${l}</span><span class="rv">${v}</span></div>`).join('');
  $('sucView').style.display='flex';
}

function newScan(){
  $('sucView').style.display='none';
  $('scanView').style.display='flex';
  croppedBlob=null;croppedUrl=null;stable=0;autoFired=false;
  startCam();
}

const setPill=(t,ok)=>{const p=$('pill');p.textContent=t;p.className=ok?'ok':''};

async function toggleFlash(){
  if(!vtrack)return;flashOn=!flashOn;
  try{await vtrack.applyConstraints({advanced:[{torch:flashOn}]});
    $('flashBtn').className='tBtn'+(flashOn?' on':'');}
  catch{$('flashBtn').style.opacity='.4';}
}

async function flipCam(){
  facing=facing==='environment'?'user':'environment';
  stopCam();stable=0;autoFired=false;
  await startCam();
}

function goBack(){
  stopCam();
  if(window.history.length>1)window.history.back();
  else window.location.href='index.html';
}

// GALLERY
$('gin').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const s=Math.min(1,2200/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      $('galImg').src=rd.result;$('galImg').style.display='block';$('galIco').style.display='none';
      if(cvReady&&scanner){
        try{
          const cropped=scanner.extractPaper(c,c.width,c.height);
          if(cropped&&cropped.width>50){
            enhance(cropped.getContext('2d'),cropped.width,cropped.height);
            croppedUrl=cropped.toDataURL('image/jpeg',.95);
            cropped.toBlob(b=>{croppedBlob=b;$('rvImg').src=croppedUrl;showReview();},'image/jpeg',.95);
            return;
          }
        }catch(e){}
      }
      enhance(c.getContext('2d'),c.width,c.height);
      croppedUrl=c.toDataURL('image/jpeg',.95);
      c.toBlob(b=>{croppedBlob=b;$('rvImg').src=croppedUrl;showReview();},'image/jpeg',.95);
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);e.target.value='';
});

window.addEventListener('resize',onResize);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)stopCam();
  else if($('scanView').style.display!=='none'){stable=0;autoFired=false;startCam();}
});

// ابدأ
waitForLibs();
startCam();
