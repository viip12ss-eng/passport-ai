<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}
#scanView{position:fixed;inset:0;display:flex;flex-direction:column}
#vWrap{position:relative;flex:1;overflow:hidden}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#oc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#topBar{position:absolute;top:0;left:0;right:0;z-index:20;

  display:flex;align-items:center;justify-content:space-between;

.tBtn{width:40px;height:40px;border-radius:50%;background:rgba(20,20,20,.7);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;

.tBtn.on{background:rgba(255,210,0,.4)}
#topLbl{font-size:16px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9)}
#pill{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);

#pill.ok{background:rgba(0,122,255,.35);border-color:rgba(0,122,255,.7);color:#aad4ff}
#botBar{padding:14px 28px calc(env(safe-area-inset-bottom,34px)+10px);

#capBtn::after{content:'';position:absolute;inset:6px;border-radius:50%;background:#fff;transition:background .2s}

  border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
#flashFx{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity .07s}

/* REVIEW */
#rvView{position:fixed;inset:0;background:#0a0a0a;display:none;flex-direction:column}
#rvHead{padding:calc(env(safe-area-inset-top,44px)+8px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rvB{padding:9px 20px;border-radius:22px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

#rvSnd{background:#007AFF;color:#fff}

#rvWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden}
#rvImg{max-width:100%;max-height:100%;border-radius:14px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#rvFoot{padding:10px 20px calc(env(safe-area-inset-bottom,34px)+10px);
  text-align:center;font-size:13px;color:rgba(255,255,255,.4);flex-shrink:0}

/* SENDING */
#sndView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200}
.sI{font-size:52px}.sT{font-size:20px;font-weight:700}
.sS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;padding:0 28px}
.pT{width:220px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pF{height:100%;background:linear-gradient(90deg,#007AFF,#5856D6);border-radius:2px;transition:width .4s ease}

/* SUCCESS */
#sucView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:10px;z-index:200}
.scI{font-size:60px}.scT{font-size:22px;font-weight:800;color:#30d158}
.scS{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:8px}
.rc{width:100%;max-width:360px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;display:grid;gap:10px}
.rr{display:flex;justify-content:space-between;align-items:center;gap:10px}
.rl{font-size:12px;color:rgba(255,255,255,.4);flex-shrink:0}
.rv{font-size:13px;font-weight:600;text-align:left}
.nb{margin-top:8px;padding:14px 44px;border-radius:28px;background:#007AFF;
  border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}

/* ERROR */
#errView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px;z-index:200}
.eI{font-size:52px}.eT{font-size:20px;font-weight:700;color:#ff3b30}
.eS{font-size:13px;color:rgba(255,255,255,.5);text-align:center}
.rtB{padding:13px 38px;border-radius:24px;background:#ff3b30;border:none;
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
input[type=file]{display:none}

<script>
'use strict';
const N8N = localStorage.getItem('pai_webhook')||'https://mmnnm19991.app.n8n.cloud/webhook/passport-extract';
const SID = (()=>{let id=localStorage.getItem('pai_sid');if(!id){id='u'+Math.random().toString(36).slice(2,9);localStorage.setItem('pai_sid',id);}return id;})();
const $=id=>document.getElementById(id);

let stream=null, vtrack=null, flashOn=false, facing='environment';
let croppedBlob=null, croppedUrl=null;
let rafId=null, stable=0, autoFired=false;
let cvReady=false;
let currentCorners=null; // الزوايا الحالية من الفيديو

// كانفاس للمعالجة (مخفي)
const tmpCv=document.createElement('canvas');
const tmpCtx=tmpCv.getContext('2d',{willReadFrequently:true});

function onCvLoad(){
  // cv.js يحتاج لحظة إضافية
  const check=()=>{
    if(typeof cv!=='undefined'&&cv.Mat){
      cvReady=true;
      setPill('ضع الجواز أمام الكاميرا',false);
    }else setTimeout(check,200);
  };
  check();
}

// ══ الكاميرا ══
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1920},height:{ideal:1080}},audio:false
    });
    const v=$('vid');v.srcObject=stream;
    vtrack=stream.getVideoTracks()[0];
    await v.play();
    onResize();loop();
  }catch(e){setPill('لا يمكن الوصول للكاميرا',false);}
}

function stopCam(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;vtrack=null;}
}

function onResize(){
  const oc=$('oc'),w=$('vWrap');
  oc.width=w.offsetWidth;oc.height=w.offsetHeight;
}

// ══ حلقة الكشف ══
let frmSkip=0;
function loop(){
  rafId=requestAnimationFrame(loop);
  if(!cvReady)return;
  const v=$('vid');
  if(!v.videoWidth)return;

  // معالجة كل 3 إطارات
  frmSkip=(frmSkip+1)%3;
  if(frmSkip!==0){
    if(currentCorners)redraw();
    return;
  }

  // ارسم على كانفاس مصغّر للسرعة
  const W=480, H=Math.round(480*v.videoHeight/v.videoWidth);
  tmpCv.width=W;tmpCv.height=H;
  tmpCtx.drawImage(v,0,0,W,H);

  const corners=detectDoc(W,H);

  // حوّل للإحداثيات الحقيقية (الفيديو الكامل)
  if(corners){
    const sx=v.videoWidth/W, sy=v.videoHeight/H;
    currentCorners=corners.map(p=>({x:p.x*sx,y:p.y*sy}));
  }else{
    currentCorners=null;
  }

  // ارسم على الشاشة
  const oc=$('oc');
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);

  if(currentCorners){
    // حوّل للإحداثيات الشاشة
    const vw=v.videoWidth, vh=v.videoHeight;
    const dw=oc.width, dh=oc.height;
    // حساب نسبة العرض (object-fit: cover)
    const vr=vw/vh, dr=dw/dh;
    let scale,ox=0,oy=0;
    if(vr>dr){scale=dh/vh;ox=(dw-vw*scale)/2;}
    else{scale=dw/vw;oy=(dh-vh*scale)/2;}
    const sc=currentCorners.map(p=>({x:p.x*scale+ox,y:p.y*scale+oy}));
    drawOverlay(ctx,sc,dw,dh);
    setPill('✅ تم اكتشاف الجواز — سيُقص تلقائياً',true);
    $('capBtn').classList.add('rdy');
    stable++;
    if(stable>=20&&!autoFired){autoFired=true;doCapture();}
  }else{
    drawGuide(ctx,oc.width,oc.height);
    setPill('ضع الجواز أمام الكاميرا',false);
    $('capBtn').classList.remove('rdy');
    stable=0;
  }
}

function redraw(){
  if(!currentCorners)return;
  const oc=$('oc'),v=$('vid');
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  const vw=v.videoWidth,vh=v.videoHeight,dw=oc.width,dh=oc.height;
  const vr=vw/vh,dr=dw/dh;
  let scale,ox=0,oy=0;
  if(vr>dr){scale=dh/vh;ox=(dw-vw*scale)/2;}else{scale=dw/vw;oy=(dh-vh*scale)/2;}
  const sc=currentCorners.map(p=>({x:p.x*scale+ox,y:p.y*scale+oy}));
  drawOverlay(ctx,sc,dw,dh);
}

// ══ الكشف باستخدام OpenCV (findContours + approxPolyDP) ══
function detectDoc(W,H){
  let src=null,gray=null,blur=null,edges=null,dil=null,kernel=null,contours=null,hier=null;
  try{
    src=cv.imread(tmpCv);
    gray=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);

    blur=new cv.Mat();
    cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);

    edges=new cv.Mat();
    cv.Canny(blur,edges,75,200);

    dil=new cv.Mat();
    kernel=cv.Mat.ones(5,5,cv.CV_8U);
    cv.dilate(edges,dil,kernel);

    contours=new cv.MatVector();
    hier=new cv.Mat();
    cv.findContours(dil,contours,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

    // ابحث عن أكبر مضلع رباعي الأضلاع
    let maxArea=0,best=null;
    for(let i=0;i<contours.size();i++){
      const c=contours.get(i);
      const area=cv.contourArea(c);
      if(area<W*H*0.08){c.delete();continue;}
      const peri=cv.arcLength(c,true);
      const approx=new cv.Mat();
      cv.approxPolyDP(c,approx,0.02*peri,true);
      if(approx.rows===4&&area>maxArea){
        maxArea=area;
        if(best)best.delete();
        best=approx;
      }else{
        approx.delete();
      }
      c.delete();
    }

    if(!best)return null;

    const pts=[];
    for(let i=0;i<4;i++){
      pts.push({x:best.data32S[i*2],y:best.data32S[i*2+1]});
    }
    best.delete();
    return sortPts(pts);
  }catch(e){
    return null;
  }finally{
    [src,gray,blur,edges,dil,kernel,contours,hier].forEach(m=>{try{if(m)m.delete();}catch{}});
  }
}

// رتّب الزوايا: أعلى يسار، أعلى يمين، أسفل يمين، أسفل يسار
function sortPts(pts){
  const cx=pts.reduce((s,p)=>s+p.x,0)/4;
  const cy=pts.reduce((s,p)=>s+p.y,0)/4;
  const tl=pts.find(p=>p.x<=cx&&p.y<=cy)||pts[0];
  const tr=pts.find(p=>p.x> cx&&p.y<=cy)||pts[1];
  const br=pts.find(p=>p.x> cx&&p.y> cy)||pts[2];
  const bl=pts.find(p=>p.x<=cx&&p.y> cy)||pts[3];
  if(!tl||!tr||!br||!bl)return null;
  return [tl,tr,br,bl];
}

// ══ رسم إطار مثل Apple Notes ══
function drawOverlay(ctx,pts,cw,ch){
  const [tl,tr,br,bl]=pts;

  // تعتيم خارج المستند
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,cw,ch);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();ctx.fill();
  ctx.restore();

  // تعبئة زرقاء داخل المستند
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.fillStyle='rgba(0,122,255,0.12)';ctx.fill();

  // حدود
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();
  ctx.strokeStyle='rgba(0,122,255,.92)';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  // زوايا مميزة
  const L=26;
  ctx.strokeStyle='#007AFF';ctx.lineWidth=4;ctx.lineCap='round';
  function corner(a,b,c){
    const d1=Math.hypot(b.x-a.x,b.y-a.y)||1;
    const d2=Math.hypot(c.x-b.x,c.y-b.y)||1;
    ctx.beginPath();
    ctx.moveTo(b.x+(a.x-b.x)/d1*L,b.y+(a.y-b.y)/d1*L);
    ctx.lineTo(b.x,b.y);
    ctx.lineTo(b.x+(c.x-b.x)/d2*L,b.y+(c.y-b.y)/d2*L);
    ctx.stroke();
  }
  corner(bl,tl,tr);corner(tl,tr,br);corner(tr,br,bl);corner(br,bl,tl);

  // نقاط الزوايا
  [tl,tr,br,bl].forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fillStyle='#007AFF';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,122,255,.35)';ctx.lineWidth=2;ctx.stroke();
  });
}

function drawGuide(ctx,w,h){
  const mx=w*.08,my=h*.22,gw=w*.84,gh=h*.55,L=26;
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.setLineDash([7,5]);
  ctx.strokeRect(mx,my,gw,gh);ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3.5;ctx.lineCap='round';
  [[mx,my,1,0,0,1],[mx+gw,my,-1,0,0,1],[mx,my+gh,1,0,0,-1],[mx+gw,my+gh,-1,0,0,-1]].forEach(([x,y,a,,c,d])=>{
    ctx.beginPath();ctx.moveTo(x+a*L,y);ctx.lineTo(x,y);ctx.lineTo(x,y+d*L);ctx.stroke();
  });
}

// ══ الالتقاط + القص + التقويم (Perspective Transform) ══
function doCapture(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const v=$('vid');

  // بريق
  $('flashFx').style.opacity='1';
  setTimeout(()=>$('flashFx').style.opacity='0',80);

  // التقط الفيديو كاملاً
  const full=document.createElement('canvas');
  full.width=v.videoWidth||1280;
  full.height=v.videoHeight||720;
  full.getContext('2d').drawImage(v,0,0,full.width,full.height);

  // اقص وقوّم باستخدام OpenCV warpPerspective
  if(currentCorners&&cvReady){
    const cropped=perspectiveCrop(full,currentCorners);
    if(cropped){
      croppedUrl=cropped.toDataURL('image/jpeg',.95);
      cropped.toBlob(b=>{croppedBlob=b;showReview();},'image/jpeg',.95);
      return;
    }
  }

  // fallback: أرسل الصورة الكاملة
  enhance(full.getContext('2d'),full.width,full.height);
  croppedUrl=full.toDataURL('image/jpeg',.95);
  full.toBlob(b=>{croppedBlob=b;showReview();},'image/jpeg',.95);
}

// ══ القص والتقويم — هذا هو قلب الماسح ══
function perspectiveCrop(srcCanvas, corners){
  let src=null,dst=null,srcPts=null,dstPts=null,M=null;
  try{
    const [tl,tr,br,bl]=corners;

    // احسب أبعاد الجواز المقصوص
    const wTop=Math.hypot(tr.x-tl.x,tr.y-tl.y);
    const wBot=Math.hypot(br.x-bl.x,br.y-bl.y);
    const hLeft=Math.hypot(bl.x-tl.x,bl.y-tl.y);
    const hRight=Math.hypot(br.x-tr.x,br.y-tr.y);
    const outW=Math.round(Math.max(wTop,wBot));
    const outH=Math.round(Math.max(hLeft,hRight));

    if(outW<50||outH<50)return null;

    src=cv.imread(srcCanvas);
    dst=new cv.Mat();

    // نقاط المصدر (الجواز في الصورة الأصلية)
    srcPts=cv.matFromArray(4,1,cv.CV_32FC2,[
      tl.x,tl.y,  tr.x,tr.y,  br.x,br.y,  bl.x,bl.y
    ]);

    // نقاط الهدف (مستطيل مستقيم)
    dstPts=cv.matFromArray(4,1,cv.CV_32FC2,[
      0,0,  outW,0,  outW,outH,  0,outH
    ]);

    // احسب مصفوفة التحويل
    M=cv.getPerspectiveTransform(srcPts,dstPts);

    // طبّق التحويل
    cv.warpPerspective(src,dst,M,new cv.Size(outW,outH),cv.INTER_LINEAR,cv.BORDER_CONSTANT,new cv.Scalar());

    // ارسم النتيجة
    const outCanvas=document.createElement('canvas');
    outCanvas.width=outW;outCanvas.height=outH;
    cv.imshow(outCanvas,dst);

    // تحسين الصورة
    enhance(outCanvas.getContext('2d'),outW,outH);

    return outCanvas;
  }catch(e){
    console.error('perspectiveCrop error:',e);
    return null;
  }finally{
    [src,dst,srcPts,dstPts,M].forEach(m=>{try{if(m)m.delete();}catch{}});
  }
}

function enhance(ctx,w,h){
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){
    d.data[i]=cl(((d.data[i]-128)*1.18)+132);
    d.data[i+1]=cl(((d.data[i+1]-128)*1.18)+132);
    d.data[i+2]=cl(((d.data[i+2]-128)*1.18)+132);
  }
  ctx.putImageData(d,0,0);
}
const cl=v=>Math.min(255,Math.max(0,Math.round(v)));

// ══ REVIEW ══
function showReview(){
  stopCam();
  $('rvImg').src=croppedUrl;
  $('scanView').style.display='none';
  $('rvView').style.display='flex';
}

function retake(){
  croppedBlob=null;croppedUrl=null;
  ['rvView','sndView','sucView','errView'].forEach(id=>$(id).style.display='none');
  $('scanView').style.display='flex';
  stable=0;autoFired=false;currentCorners=null;
  $('capBtn').classList.remove('rdy');
  startCam();
}

// ══ SEND ══
async function sendImg(){
  if(!croppedBlob)return;
  $('rvView').style.display='none';
  $('sndView').style.display='flex';
  prog(15);sMsg('جاري إرسال الجواز المقصوص...');
  try{
    prog(35);sMsg('جاري إرسال الجواز المقصوص...');
    const fd=new FormData();
    fd.append('data',croppedBlob,'passport-cropped.jpg');
    fd.append('_sid',SID);
    const res=await fetch(N8N,{method:'POST',body:fd});
    prog(70);sMsg('جاري قراءة البيانات...');
    const txt=await res.text();
    let json=null;
    try{json=JSON.parse(txt);}catch{const m=txt.match(/\{[\s\S]*\}/);if(m)try{json=JSON.parse(m[0]);}catch{}}
    if(!res.ok)throw new Error('HTTP '+res.status);
    if(!json)throw new Error('لم يرجع بيانات');
    if(Array.isArray(json))json=json[0]||{};
    if(json.data&&typeof json.data==='object')json=json.data;
    prog(100);sMsg('تم!');
    setTimeout(()=>showSuc(json),350);
  }catch(e){
    $('sndView').style.display='none';
    $('errMsg').textContent=e.message||'خطأ';
    $('errView').style.display='flex';
  }
}
const prog=p=>$('pFll').style.width=p+'%';
const sMsg=m=>$('sndMsg').textContent=m;

function showSuc(d){
  $('sndView').style.display='none';
  const F=[['الاسم',d.nameEnglish],['رقم الجواز',d.passportNumber||d.passportNo],
    ['الجنسية',d.nationalityArabic],['الميلاد',d.dateOfBirth],
    ['الإصدار',d.dateOfIssue],['الانتهاء',d.dateOfExpiry]
  ].filter(([,v])=>v&&v!=='null');
  $('resCard').innerHTML=F.map(([l,v])=>
    `<div class="rr"><span class="rl">${l}</span><span class="rv">${v}</span></div>`).join('');
  $('sucView').style.display='flex';
}

function newScan(){
  $('sucView').style.display='none';
  $('scanView').style.display='flex';
  croppedBlob=null;croppedUrl=null;stable=0;autoFired=false;currentCorners=null;
  startCam();
}

const setPill=(t,ok)=>{const p=$('pill');p.textContent=t;p.className=ok?'ok':''};

async function toggleFlash(){
  if(!vtrack)return;flashOn=!flashOn;
  try{await vtrack.applyConstraints({advanced:[{torch:flashOn}]});
    $('flashBtn').className='tBtn'+(flashOn?' on':'');}
  catch{$('flashBtn').style.opacity='.4';}
}

async function flipCam(){
  facing=facing==='environment'?'user':'environment';
  stopCam();stable=0;autoFired=false;currentCorners=null;
  await startCam();
}

function goBack(){stopCam();if(window.history.length>1)window.history.back();else window.location.href='index.html';}

$('gin').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      // كشف واقص من الصورة الثابتة
      const s=Math.min(1,2200/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);

      // حاول الكشف والقص
      if(cvReady){
        tmpCv.width=c.width;tmpCv.height=c.height;
        tmpCtx.drawImage(c,0,0);
        const corners=detectDoc(c.width,c.height);
        if(corners){
          const cropped=perspectiveCrop(c,corners);
          if(cropped){
            $('galImg').src=rd.result;$('galImg').style.display='block';$('galIco').style.display='none';
            croppedUrl=cropped.toDataURL('image/jpeg',.95);
            cropped.toBlob(b=>{croppedBlob=b;$('rvImg').src=croppedUrl;showReview();},'image/jpeg',.95);
            return;
          }
        }
      }
      // fallback
      enhance(ctx,c.width,c.height);
      $('galImg').src=rd.result;$('galImg').style.display='block';$('galIco').style.display='none';
      croppedUrl=c.toDataURL('image/jpeg',.95);
      c.toBlob(b=>{croppedBlob=b;$('rvImg').src=croppedUrl;showReview();},'image/jpeg',.95);
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);e.target.value='';
});

window.addEventListener('resize',onResize);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)stopCam();
  else if($('scanView').style.display!=='none'){stable=0;autoFired=false;startCam();}
});

startCam();
</script>
