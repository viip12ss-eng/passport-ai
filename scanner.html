<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Passport Scanner">
<meta name="theme-color" content="#000">
<title>Passport Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,"Helvetica Neue",sans-serif;color:#fff;}
#scannerView{position:fixed;inset:0;display:flex;flex-direction:column;}
#videoWrap{position:relative;flex:1;overflow:hidden;background:#000;}
video{width:100%;height:100%;object-fit:cover;display:block;}
#docFrame{position:absolute;border:2px solid rgba(69,243,255,0.9);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,0.45);transition:all .15s;display:none;}
#docFrame.detected{border-color:#22c55e;box-shadow:0 0 0 2000px rgba(0,0,0,0.45),0 0 20px rgba(34,197,94,0.6);}
.corner{position:absolute;width:22px;height:22px;}
.corner-tl{top:-2px;left:-2px;border-top:3px solid currentColor;border-left:3px solid currentColor;border-radius:4px 0 0 0;}
.corner-tr{top:-2px;right:-2px;border-top:3px solid currentColor;border-right:3px solid currentColor;border-radius:0 4px 0 0;}
.corner-bl{bottom:-2px;left:-2px;border-bottom:3px solid currentColor;border-left:3px solid currentColor;border-radius:0 0 0 4px;}
.corner-br{bottom:-2px;right:-2px;border-bottom:3px solid currentColor;border-right:3px solid currentColor;border-radius:0 0 4px 0;}
#grid{position:absolute;inset:0;pointer-events:none;opacity:.12;}
#topBar{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,44px) + 8px) 20px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;align-items:center;justify-content:space-between;z-index:10;}
#topTitle{font-size:17px;font-weight:600;letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.8);}
#flashBtn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#flashBtn.on{background:rgba(255,220,0,.35);}
#statusMsg{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:8px 18px;font-size:14px;font-weight:500;white-space:nowrap;z-index:10;}
#statusMsg.detected{background:rgba(34,197,94,.3);border-color:rgba(34,197,94,.5);color:#4ade80;}
#statusMsg.scanning{color:#45f3ff;}
#bottomBar{padding:20px 30px calc(env(safe-area-inset-bottom,34px) + 20px);background:linear-gradient(to top,rgba(0,0,0,.85),transparent);display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0;}
#captureBtn{width:72px;height:72px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.4);cursor:pointer;position:relative;box-shadow:0 0 0 3px rgba(255,255,255,.2);flex-shrink:0;}
#captureBtn::after{content:"";position:absolute;inset:6px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.1);}
#captureBtn:active{transform:scale(.93);}
#captureBtn.auto{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.4),0 0 20px rgba(34,197,94,.5);}
#closeBtn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#galleryBtn{width:54px;height:54px;border-radius:12px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
#galleryPreview{width:100%;height:100%;object-fit:cover;display:none;}
#autoIndicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:3px solid #22c55e;display:none;pointer-events:none;animation:autoCapture .6s ease-out forwards;}
@keyframes autoCapture{0%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;}}
#flashEffect{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;transition:opacity .05s;}
#reviewView{position:fixed;inset:0;background:#000;display:none;flex-direction:column;}
#reviewHeader{padding:calc(env(safe-area-inset-top,44px) + 8px) 20px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.8);flex-shrink:0;}
#reviewHeader button{padding:8px 16px;border-radius:20px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
#retakeBtn{background:rgba(255,255,255,.15);color:#fff;}
#useBtn{background:#007AFF;color:#fff;}
#reviewTitle{font-size:17px;font-weight:600;}
#reviewImgWrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;touch-action:none;}
#reviewImg{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain;}
#cropBox{position:absolute;border:2px solid #45f3ff;border-radius:16px;box-shadow:0 0 0 2000px rgba(0,0,0,.52);display:none;touch-action:none;}
.crop-handle{position:absolute;width:24px;height:24px;border-radius:50%;background:#45f3ff;border:2px solid rgba(0,0,0,.45);}
.crop-handle.tl{top:-12px;left:-12px;}.crop-handle.tr{top:-12px;right:-12px;}.crop-handle.bl{bottom:-12px;left:-12px;}.crop-handle.br{bottom:-12px;right:-12px;}
#cropHint{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.72);white-space:nowrap;}
#reviewFooter{padding:14px 20px calc(env(safe-area-inset-bottom,34px) + 14px);background:rgba(0,0,0,.8);text-align:center;font-size:13px;color:rgba(255,255,255,.5);flex-shrink:0;}
#reviewActions{display:flex;gap:10px;justify-content:center;margin-top:10px;}
#resetCropBtn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);}
#sendingView{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:50;}
.send-icon{font-size:52px;}.send-title{font-size:20px;font-weight:700;}.send-msg{font-size:14px;color:rgba(255,255,255,.6);text-align:center;padding:0 30px;}
.progress-track{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#45f3ff,#7b61ff);border-radius:2px;transition:width .3s;width:0%;}
#successView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:50;}
.success-icon{font-size:60px;margin-bottom:12px;}.success-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#22c55e;}.success-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;text-align:center;}
.result-card{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;display:grid;gap:10px;max-width:380px;margin-bottom:24px;}
.result-row{display:flex;justify-content:space-between;align-items:center;}
.result-label{font-size:12px;color:rgba(255,255,255,.4);}.result-val{font-size:14px;font-weight:600;color:#e8eaf6;text-align:left;}
.new-scan-btn{padding:14px 40px;border-radius:24px;background:linear-gradient(135deg,#45f3ff,#7b61ff);border:none;color:#000;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
#errorView{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:50;gap:16px;}
.error-icon{font-size:52px;}.error-title{font-size:20px;font-weight:700;color:#ef4444;}.error-msg{font-size:13px;color:rgba(255,255,255,.5);text-align:center;}
.retry-btn{padding:12px 32px;border-radius:20px;background:#ef4444;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="scannerView">
  <div id="videoWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="grid"></canvas>
    <div id="docFrame"><div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div></div>
    <div id="autoIndicator"></div><div id="flashEffect"></div>
    <div id="topBar">
      <button id="closeBtn" onclick="goBack()">&#x2715;</button>
      <div id="topTitle">&#x1F4F7; مسح الجواز</div>
      <button id="flashBtn" onclick="toggleFlash()">&#x26A1;</button>
    </div>
    <div id="statusMsg" class="scanning">وجّه الكاميرا نحو الجواز</div>
  </div>
  <div id="bottomBar">
    <div id="galleryBtn" onclick="document.getElementById('galleryInput').click()">
      <img id="galleryPreview" alt=""><span id="galleryIcon">&#x1F5BC;</span>
      <input type="file" id="galleryInput" accept="image/*" style="display:none">
    </div>
    <button id="captureBtn" onclick="capture()"></button>
    <div style="width:54px"></div>
  </div>
</div>
<div id="reviewView">
  <div id="reviewHeader">
    <button id="retakeBtn" onclick="retake()">إعادة</button>
    <div id="reviewTitle">مراجعة الصورة</div>
    <button id="useBtn" onclick="sendImage()">إرسال &#x2713;</button>
  </div>
  <div id="reviewImgWrap">
    <img id="reviewImg" alt="">
    <div id="cropBox">
      <span class="crop-handle tl" data-handle="tl"></span><span class="crop-handle tr" data-handle="tr"></span>
      <span class="crop-handle bl" data-handle="bl"></span><span class="crop-handle br" data-handle="br"></span>
    </div>
    <div id="cropHint">حرّك الإطار أو اسحب الزوايا لقص الصورة</div>
  </div>
  <div id="reviewFooter">تأكد أن الجواز واضح قبل الإرسال<div id="reviewActions"><button id="resetCropBtn" onclick="resetCrop()">إعادة القص</button></div></div>
</div>
<div id="sendingView">
  <div class="send-icon">&#x1F52C;</div>
  <div class="send-title">جاري الإرسال...</div>
  <div class="send-msg" id="sendMsg">يتم معالجة الصورة</div>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
</div>
<div id="successView">
  <div class="success-icon">&#x2705;</div>
  <div class="success-title">تم!</div>
  <div class="success-sub" id="successSub">تم الإرسال</div>
  <div class="result-card" id="resultCard"></div>
  <button class="new-scan-btn" id="newScanBtn" onclick="newScan()">&#x1F4F7; مسح جواز جديد</button>
</div>
<div id="errorView">
  <div class="error-icon">&#x274C;</div>
  <div class="error-title">فشل الإرسال</div>
  <div class="error-msg" id="errorMsg">حدث خطأ</div>
  <button class="retry-btn" onclick="retake()">حاول مجدداً</button>
</div>
<script>
'use strict';
function sanitizeFileName(n){return n.replace(/[()\[\]{}'",;:!@#$%^&*+=|\\/<>?]/g,"").replace(/[-–—]/g," ").replace(/\s+/g," ").trim();}
const SEARCH=new URLSearchParams(location.search);
const _rawMode=SEARCH.get("mode")||localStorage.getItem("pai_mobile_mode")||"passport";
const APP_MODE=_rawMode==="document"?"document":_rawMode==="pc-passport"?"pc-passport":"passport";
const APP_CONTEXT=SEARCH.get("context")||sessionStorage.getItem("pai_passport_context")||"new";
const CONTEXT_TITLES={new:"تأشيرة جديدة",renew:"تحديث وتجديد",search:"استعلام عن تأشيرة"};
const API_BASE=localStorage.getItem("pai_api_base")||"https://phd-considering-aaa-despite.trycloudflare.com";
const STORE_URL=localStorage.getItem("pai_store_url")||API_BASE+"/webhook/passport-store";
const EXTRACT_URL=localStorage.getItem("pai_extract_url")||localStorage.getItem("pai_webhook")||API_BASE+"/webhook/passport-extract1";
const SID=(()=>{let id=localStorage.getItem("pai_sid");if(!id){id="u"+Math.random().toString(36).slice(2,9);localStorage.setItem("pai_sid",id);}return id;})();
let stream=null,track=null,flashOn=false,capturedBlob=null,capturedDataUrl=null,detectionActive=false,cropRect=null,cropBounds=null,cropPointer=null;
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
function updateModeUi(){
  if(APP_MODE==="document"){
    document.title="Document Scanner";
    document.getElementById("topTitle").textContent="\uD83D\uDCCE تصوير مستند";
    document.getElementById("statusMsg").textContent="وجّه الكاميرا نحو المستند";
    document.querySelector("#sendingView .send-title").textContent="جاري رفع المستند...";
    document.getElementById("sendMsg").textContent="يتم تجهيز المستند وإرساله";
    document.querySelector("#successView .success-title").textContent="تم إرسال المستند!";
    document.getElementById("successSub").textContent="سيصل المرفق للكمبيوتر تلقائياً";
    document.getElementById("newScanBtn").style.display="none";
    return;
  }
  if(APP_MODE==="pc-passport"){
    const t=CONTEXT_TITLES[APP_CONTEXT]||APP_CONTEXT;
    document.title=t;
    document.getElementById("topTitle").textContent="\uD83D\uDCF7 "+t;
    document.getElementById("statusMsg").textContent="وجّه الكاميرا نحو الجواز";
    document.querySelector("#sendingView .send-title").textContent="جاري الإرسال للكمبيوتر...";
    document.getElementById("sendMsg").textContent="يتم تجهيز الصورة وإرسالها";
    document.querySelector("#successView .success-title").textContent="تم الإرسال!";
    document.getElementById("successSub").textContent="سيُعبأ الجواز على الكمبيوتر تلقائياً";
    document.getElementById("newScanBtn").style.display="none";
  }
}
async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}},audio:false});
    const video=document.getElementById("video");video.srcObject=stream;track=stream.getVideoTracks()[0];
    video.onloadedmetadata=()=>{video.play();drawGrid();startAutoDetect();};
  }catch(e){showStatus("لا يمكن الوصول للكاميرا.");}
}
function drawGrid(){
  const canvas=document.getElementById("grid"),wrap=document.getElementById("videoWrap");
  canvas.width=wrap.offsetWidth;canvas.height=wrap.offsetHeight;
  const ctx=canvas.getContext("2d");ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=0.5;
  for(let i=1;i<=2;i++){ctx.beginPath();ctx.moveTo(canvas.width*i/3,0);ctx.lineTo(canvas.width*i/3,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,canvas.height*i/3);ctx.lineTo(canvas.width,canvas.height*i/3);ctx.stroke();}
}
function startAutoDetect(){
  detectionActive=true;let stable=0;
  const check=()=>{
    if(!detectionActive)return;
    const video=document.getElementById("video"),w=video.videoWidth,h=video.videoHeight;
    if(!w){requestAnimationFrame(check);return;}
    const canvas=document.createElement("canvas");canvas.width=Math.min(w,320);canvas.height=Math.min(h,240);
    const ctx=canvas.getContext("2d");ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    let brightness=0,edgeCount=0;
    for(let i=0;i<data.length;i+=16)brightness+=(data[i]+data[i+1]+data[i+2])/3;
    brightness/=(data.length/16);
    for(let y=1;y<canvas.height-1;y+=3)for(let x=1;x<canvas.width-1;x+=3){const idx=(y*canvas.width+x)*4;if(Math.abs(data[idx]-data[(y*canvas.width+x+1)*4])+Math.abs(data[idx]-data[((y+1)*canvas.width+x)*4])>30)edgeCount++;}
    const er=edgeCount/(canvas.width*canvas.height/9),isDoc=brightness>60&&brightness<230&&er>0.04&&er<0.45;
    if(isDoc){stable++;showDocFrame(true);}else{stable=0;showDocFrame(false);}
    if(stable>=8){stable=0;autoCapture();}else{setTimeout(check,120);}
  };
  setTimeout(check,500);
}
function showDocFrame(detected){
  const frame=document.getElementById("docFrame"),msg=document.getElementById("statusMsg"),btn=document.getElementById("captureBtn");
  if(detected){
    const wrap=document.getElementById("videoWrap"),pw=wrap.offsetWidth,ph=wrap.offsetHeight,m=0.08;
    frame.style.cssText="display:block;left:"+pw*m+"px;top:"+ph*0.25+"px;width:"+pw*(1-m*2)+"px;height:"+ph*0.5+"px;";
    frame.classList.add("detected");frame.querySelectorAll(".corner").forEach(c=>c.style.color="#22c55e");
    msg.textContent=APP_MODE==="document"?"\u2705 تم اكتشاف المستند":"\u2705 تم اكتشاف الجواز";
    msg.className="detected";btn.classList.add("auto");
  }else{
    frame.classList.remove("detected");frame.querySelectorAll(".corner").forEach(c=>c.style.color="rgba(69,243,255,0.9)");
    frame.style.display="none";msg.textContent=APP_MODE==="document"?"وجّه الكاميرا نحو المستند":"وجّه الكاميرا نحو الجواز";
    msg.className="scanning";btn.classList.remove("auto");
  }
}
function autoCapture(){const ind=document.getElementById("autoIndicator");ind.style.display="block";setTimeout(()=>{ind.style.display="none";},600);capture();}
async function capture(){
  detectionActive=false;
  const video=document.getElementById("video"),flash=document.getElementById("flashEffect");
  flash.style.opacity="1";setTimeout(()=>{flash.style.opacity="0";},100);
  const canvas=document.createElement("canvas");canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;
  const ctx=canvas.getContext("2d");ctx.drawImage(video,0,0,canvas.width,canvas.height);
  enhanceImage(ctx,canvas.width,canvas.height);
  capturedDataUrl=canvas.toDataURL("image/jpeg",0.95);
  canvas.toBlob(blob=>{capturedBlob=blob;showReview();},"image/jpeg",0.95);
}
function enhanceImage(ctx,w,h){const d=ctx.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){d.data[i]=Math.min(255,Math.max(0,((d.data[i]-128)*1.14)+132));d.data[i+1]=Math.min(255,Math.max(0,((d.data[i+1]-128)*1.14)+132));d.data[i+2]=Math.min(255,Math.max(0,((d.data[i+2]-128)*1.14)+132));}ctx.putImageData(d,0,0);}
function showReview(){stopCamera();const img=document.getElementById("reviewImg");img.onload=()=>requestAnimationFrame(initCropper);img.src=capturedDataUrl;document.getElementById("scannerView").style.display="none";document.getElementById("reviewView").style.display="flex";}
function retake(){capturedBlob=null;capturedDataUrl=null;cropRect=null;cropBounds=null;cropPointer=null;["reviewView","sendingView","successView","errorView"].forEach(id=>document.getElementById(id).style.display="none");document.getElementById("scannerView").style.display="flex";startCamera();}
function initCropper(){
  const wrap=document.getElementById("reviewImgWrap"),img=document.getElementById("reviewImg"),box=document.getElementById("cropBox");
  const wr=wrap.getBoundingClientRect(),ir=img.getBoundingClientRect();
  cropBounds={left:ir.left-wr.left,top:ir.top-wr.top,width:ir.width,height:ir.height};
  const mx=cropBounds.width*0.08,my=cropBounds.height*0.12;
  cropRect={x:cropBounds.left+mx,y:cropBounds.top+my,width:cropBounds.width-mx*2,height:cropBounds.height-my*2};
  renderCropBox();box.style.display="block";
}
function renderCropBox(){if(!cropRect)return;const box=document.getElementById("cropBox");box.style.left=cropRect.x+"px";box.style.top=cropRect.y+"px";box.style.width=cropRect.width+"px";box.style.height=cropRect.height+"px";}
function resetCrop(){initCropper();}
function pointerPos(e){const r=document.getElementById("reviewImgWrap").getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function startCropDrag(e,mode){if(!cropRect||!cropBounds)return;e.preventDefault();const p=pointerPos(e);cropPointer={mode,startX:p.x,startY:p.y,rect:{...cropRect}};}
function applyCropDrag(e){
  if(!cropPointer||!cropRect||!cropBounds)return;e.preventDefault();
  const p=pointerPos(e),dx=p.x-cropPointer.startX,dy=p.y-cropPointer.startY,min=90,next={...cropPointer.rect};
  if(cropPointer.mode==="move"){next.x=clamp(cropPointer.rect.x+dx,cropBounds.left,cropBounds.left+cropBounds.width-cropPointer.rect.width);next.y=clamp(cropPointer.rect.y+dy,cropBounds.top,cropBounds.top+cropBounds.height-cropPointer.rect.height);}
  else if(cropPointer.mode==="tl"){const r=cropPointer.rect.x+cropPointer.rect.width,b=cropPointer.rect.y+cropPointer.rect.height;next.x=clamp(cropPointer.rect.x+dx,cropBounds.left,r-min);next.y=clamp(cropPointer.rect.y+dy,cropBounds.top,b-min);next.width=r-next.x;next.height=b-next.y;}
  else if(cropPointer.mode==="tr"){const b=cropPointer.rect.y+cropPointer.rect.height;next.y=clamp(cropPointer.rect.y+dy,cropBounds.top,b-min);next.width=clamp(cropPointer.rect.width+dx,min,cropBounds.left+cropBounds.width-cropPointer.rect.x);next.height=b-next.y;}
  else if(cropPointer.mode==="bl"){const r=cropPointer.rect.x+cropPointer.rect.width;next.x=clamp(cropPointer.rect.x+dx,cropBounds.left,r-min);next.width=r-next.x;next.height=clamp(cropPointer.rect.height+dy,min,cropBounds.top+cropBounds.height-cropPointer.rect.y);}
  else if(cropPointer.mode==="br"){next.width=clamp(cropPointer.rect.width+dx,min,cropBounds.left+cropBounds.width-cropPointer.rect.x);next.height=clamp(cropPointer.rect.height+dy,min,cropBounds.top+cropBounds.height-cropPointer.rect.y);}
  cropRect=next;renderCropBox();
}
function endCropDrag(){cropPointer=null;}
async function blobToBase64(blob){return await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||"").split("base64,")[1]||"");reader.onerror=()=>reject(new Error("read error"));reader.readAsDataURL(blob);});}
async function getProcessedBlob(){
  if(!capturedDataUrl||!cropRect||!cropBounds)return capturedBlob;
  const img=new Image();img.src=capturedDataUrl;await img.decode();
  const sx=Math.round((cropRect.x-cropBounds.left)*(img.naturalWidth/cropBounds.width)),sy=Math.round((cropRect.y-cropBounds.top)*(img.naturalHeight/cropBounds.height));
  const sw=Math.round(cropRect.width*(img.naturalWidth/cropBounds.width)),sh=Math.round(cropRect.height*(img.naturalHeight/cropBounds.height));
  const canvas=document.createElement("canvas");canvas.width=sw;canvas.height=sh;
  canvas.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,sw,sh);
  enhanceImage(canvas.getContext("2d"),sw,sh);
  let fw=sw,fh=sh;if(Math.max(fw,fh)>1600){const sc=1600/Math.max(fw,fh);fw=Math.round(fw*sc);fh=Math.round(fh*sc);const c2=document.createElement("canvas");c2.width=fw;c2.height=fh;c2.getContext("2d").drawImage(canvas,0,0,fw,fh);canvas.width=fw;canvas.height=fh;canvas.getContext("2d").drawImage(c2,0,0);}
  return await new Promise((resolve,reject)=>{const tryQ=(q)=>{canvas.toBlob(b=>{if(!b){reject(new Error("blob"));return;}if(b.size<=490*1024||q<=0.4)resolve(b);else tryQ(Math.round((q-0.08)*100)/100);},"image/jpeg",q);};tryQ(0.85);});
}
async function sendImage(){
  if(!capturedBlob)return;
  document.getElementById("reviewView").style.display="none";
  document.getElementById("sendingView").style.display="flex";
  setProgress(15);setSendMsg("جاري تجهيز الصورة...");
  try{
    const processedBlob=await getProcessedBlob();setProgress(35);
    if(APP_MODE==="pc-passport"){
      setSendMsg("جاري الإرسال للكمبيوتر...");
      const payload={_mode:"attachment",_slot:"passport",_context:APP_CONTEXT,_source:"sovereign-mobile-scanner",_ts:Date.now(),fileName:"passport.jpg",mimeType:"image/jpeg",contentBase64:await blobToBase64(processedBlob)};
      const res=await fetch(STORE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error("HTTP "+res.status);
      setProgress(100);setSendMsg("تم!");
      setTimeout(()=>{
        document.getElementById("sendingView").style.display="none";
        document.getElementById("resultCard").innerHTML='<div class="result-row"><span class="result-label">العملية</span><span class="result-val">'+(CONTEXT_TITLES[APP_CONTEXT]||APP_CONTEXT)+'</span></div><div class="result-row"><span class="result-label">الحالة</span><span class="result-val">\u2705 وصل للكمبيوتر</span></div>';
        document.getElementById("successView").style.display="flex";
        setTimeout(()=>{window.location.href="index.html";},2500);
      },300);
      return;
    }
    if(APP_MODE==="document"){
      setSendMsg("جاري إرسال المستند...");
      const s=Number(sessionStorage.getItem("pai_pending_slot")||new URLSearchParams(location.search).get("slot")||0);
      const slotNames={1:"عقد العمل",2:"صورة جواز السفر لصاحب الطلب",3:"صورة جواز السفر للملتحق به",4:"صورة شخصية لصاحب الطلب",5:"اثبات صلة قرابة",6:"صورة بطاقة الإقامة للملتحق به",7:"رسالة صاحب العمل تعهد"};
      const payload={_mode:"attachment",_visaType:sessionStorage.getItem("pai_visa_type")||"",_slot:s,_source:"mobile-document-scanner",_ts:Date.now(),fileName:sanitizeFileName(slotNames[s]||"مستند "+s)+".jpg",mimeType:"image/jpeg",contentBase64:await blobToBase64(processedBlob)};
      const res=await fetch(STORE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error("HTTP "+res.status);
      setProgress(100);setSendMsg("تم إرسال المستند");
      const done=JSON.parse(sessionStorage.getItem("pai_done_slots_session")||"[]");
      if(s&&!done.includes(s)){done.push(s);sessionStorage.setItem("pai_done_slots_session",JSON.stringify(done));}
      setTimeout(()=>{document.getElementById("sendingView").style.display="none";document.getElementById("resultCard").innerHTML='<div class="result-row"><span class="result-label">الحالة</span><span class="result-val">تم الرفع</span></div>';document.getElementById("successView").style.display="flex";setTimeout(()=>{window.location.href="index.html?done="+s;},1500);},300);
      return;
    }
    setSendMsg("جاري إرسال الصورة لاستخراج البيانات...");
    const fd=new FormData();fd.append("data",processedBlob,"passport-scan.jpg");fd.append("_sid",SID);fd.append("_source","mobile-scanner");
    const res=await fetch(EXTRACT_URL,{method:"POST",body:fd});
    setProgress(70);setSendMsg("جاري قراءة البيانات...");
    const text=await res.text();let json=null;
    try{json=JSON.parse(text);}catch{const m=text.match(/\{[\s\S]*\}/);if(m)try{json=JSON.parse(m[0]);}catch{}}
    if(!res.ok)throw new Error("HTTP "+res.status);
    if(!json)throw new Error("لم يرجع بيانات");
    if(Array.isArray(json))json=json[0]||{};
    if(json.data&&typeof json.data==="object")json=json.data;
    setProgress(100);setSendMsg("تم!");
    setTimeout(()=>showSuccess(json),300);
  }catch(e){
    document.getElementById("sendingView").style.display="none";
    document.getElementById("errorMsg").textContent=e.message||"حدث خطأ";
    document.getElementById("errorView").style.display="flex";
  }
}
function setProgress(p){document.getElementById("progFill").style.width=p+"%";}
function setSendMsg(m){document.getElementById("sendMsg").textContent=m;}
function showSuccess(d){
  document.getElementById("sendingView").style.display="none";
  const fields=[["الاسم",d.nameEnglish],["رقم الجواز",d.passportNumber||d.passportNo],["الجنسية",d.nationalityArabic],["تاريخ الميلاد",d.dateOfBirth],["تاريخ الإصدار",d.dateOfIssue],["تاريخ الانتهاء",d.dateOfExpiry],["مكان الإصدار",d.placeOfIssueEnglishUpper||d.placeOfIssueArabic]].filter(([,v])=>v&&v!=="null");
  document.getElementById("resultCard").innerHTML=fields.map(([l,v])=>'<div class="result-row"><span class="result-label">'+l+'</span><span class="result-val">'+v+'</span></div>').join("")||'<p style="color:rgba(255,255,255,.4);font-size:13px">لا توجد بيانات</p>';
  document.getElementById("successView").style.display="flex";
}
function newScan(){document.getElementById("successView").style.display="none";document.getElementById("scannerView").style.display="flex";capturedBlob=null;capturedDataUrl=null;startCamera();}
async function toggleFlash(){if(!track)return;flashOn=!flashOn;try{await track.applyConstraints({advanced:[{torch:flashOn}]});document.getElementById("flashBtn").className=flashOn?"on":"";}catch(e){document.getElementById("flashBtn").style.opacity="0.3";}}
document.getElementById("galleryInput").addEventListener("change",async(e)=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async()=>{capturedDataUrl=reader.result;const img=new Image();img.onload=()=>{const canvas=document.createElement("canvas"),s=Math.min(1,2200/Math.max(img.width,img.height));canvas.width=Math.round(img.width*s);canvas.height=Math.round(img.height*s);const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,canvas.width,canvas.height);enhanceImage(ctx,canvas.width,canvas.height);const prev=document.getElementById("galleryPreview");prev.src=capturedDataUrl;prev.style.display="block";document.getElementById("galleryIcon").style.display="none";canvas.toBlob(blob=>{capturedBlob=blob;capturedDataUrl=canvas.toDataURL("image/jpeg",0.95);showReview();},"image/jpeg",0.95);};img.src=reader.result;};
  reader.readAsDataURL(file);e.target.value="";
});
function stopCamera(){detectionActive=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
function showStatus(msg){document.getElementById("statusMsg").textContent=msg;document.getElementById("statusMsg").className="";}
function goBack(){stopCamera();if(window.history.length>1)window.history.back();else window.location.href="index.html";}
updateModeUi();startCamera();
const cropBox=document.getElementById("cropBox");
cropBox.addEventListener("pointerdown",e=>{startCropDrag(e,e.target.dataset.handle||"move");});
window.addEventListener("pointermove",applyCropDrag,{passive:false});
window.addEventListener("pointerup",endCropDrag);
window.addEventListener("resize",()=>{if(document.getElementById("reviewView").style.display==="flex"&&capturedDataUrl)requestAnimationFrame(initCropper);});
document.addEventListener("visibilitychange",()=>{if(document.hidden)stopCamera();else if(document.getElementById("scannerView").style.display!=="none")startCamera();});
</script>
