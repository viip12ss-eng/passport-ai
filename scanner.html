<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Passport Scanner">
<meta name="theme-color" content="#000">
<title>Passport Scanner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Helvetica Neue', sans-serif; color: #fff; }

/* ── SCANNER VIEW ── */
#scannerView {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
}

#videoWrap {
  position: relative; flex: 1; overflow: hidden; background: #000;
}

video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

/* الإطار الكاشف */
#frameOverlay {
  position: absolute; inset: 0;
  pointer-events: none;
}

/* تأثير اكتشاف المستند */
#docFrame {
  position: absolute;
  border: 2px solid rgba(69,243,255,0.9);
  border-radius: 8px;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
  transition: all 0.15s ease;
  display: none;
}

#docFrame.detected {
  border-color: #22c55e;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.45), 0 0 20px rgba(34,197,94,0.6);
}

/* خطوط الزوايا */
.corner {
  position: absolute; width: 22px; height: 22px;
}
.corner-tl { top: -2px; left: -2px; border-top: 3px solid currentColor; border-left: 3px solid currentColor; border-radius: 4px 0 0 0; }
.corner-tr { top: -2px; right: -2px; border-top: 3px solid currentColor; border-right: 3px solid currentColor; border-radius: 0 4px 0 0; }
.corner-bl { bottom: -2px; left: -2px; border-bottom: 3px solid currentColor; border-left: 3px solid currentColor; border-radius: 0 0 0 4px; }
.corner-br { bottom: -2px; right: -2px; border-bottom: 3px solid currentColor; border-right: 3px solid currentColor; border-radius: 0 0 4px 0; }

/* شبكة المساعدة */
#grid {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.12;
}

/* شريط أعلى */
#topBar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: calc(env(safe-area-inset-top, 44px) + 8px) 20px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10;
}

#topTitle {
  font-size: 17px; font-weight: 600; letter-spacing: 0.3px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

#flashBtn {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.18); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
#flashBtn.on { background: rgba(255,220,0,0.35); border-color: rgba(255,220,0,0.6); }

/* رسالة الحالة */
#statusMsg {
  position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 8px 18px;
  font-size: 14px; font-weight: 500; white-space: nowrap;
  transition: all 0.3s; z-index: 10;
  text-shadow: none;
}
#statusMsg.detected { background: rgba(34,197,94,0.3); border-color: rgba(34,197,94,0.5); color: #4ade80; }
#statusMsg.scanning { color: #45f3ff; }

/* شريط أسفل */
#bottomBar {
  padding: 20px 30px calc(env(safe-area-inset-bottom, 34px) + 20px);
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10; flex-shrink: 0;
}

/* زر الالتقاط */
#captureBtn {
  width: 72px; height: 72px; border-radius: 50%;
  background: #fff; border: 4px solid rgba(255,255,255,0.4);
  cursor: pointer; position: relative;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
  flex-shrink: 0;
}
#captureBtn::after {
  content: '';
  position: absolute; inset: 6px;
  border-radius: 50%; background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
}
#captureBtn:active { transform: scale(0.93); }
#captureBtn.auto { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.4), 0 0 20px rgba(34,197,94,0.5); }

/* زر الإغلاق */
#closeBtn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* زر الاستوديو */
#galleryBtn {
  width: 54px; height: 54px; border-radius: 12px;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  overflow: hidden; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #fff;
}
#galleryPreview {
  width: 100%; height: 100%; object-fit: cover; display: none;
}

/* مؤشر الالتقاط التلقائي */
#autoIndicator {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 3px solid #22c55e;
  display: none; pointer-events: none;
  animation: autoCapture 0.6s ease-out forwards;
}
@keyframes autoCapture {
  0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
}

/* بريق الالتقاط */
#flashEffect {
  position: absolute; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 20;
  transition: opacity 0.05s;
}

/* ── REVIEW VIEW ── */
#reviewView {
  position: fixed; inset: 0;
  background: #000;
  display: none; flex-direction: column;
}

#reviewHeader {
  padding: calc(env(safe-area-inset-top, 44px) + 8px) 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.8);
  flex-shrink: 0;
}

#reviewHeader button {
  padding: 8px 16px; border-radius: 20px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit;
}

#retakeBtn { background: rgba(255,255,255,0.15); color: #fff; }
#useBtn { background: #007AFF; color: #fff; }

#reviewTitle { font-size: 17px; font-weight: 600; }

#reviewImgWrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 10px; overflow: hidden;
}

#reviewImg {
  max-width: 100%; max-height: 100%;
  border-radius: 12px; object-fit: contain;
}

#reviewFooter {
  padding: 14px 20px calc(env(safe-area-inset-bottom, 34px) + 14px);
  background: rgba(0,0,0,0.8); text-align: center;
  font-size: 13px; color: rgba(255,255,255,0.5);
  flex-shrink: 0;
}

/* ── SENDING VIEW ── */
#sendingView {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  z-index: 50;
}

.send-icon { font-size: 52px; }

.send-title { font-size: 20px; font-weight: 700; }

.send-msg { font-size: 14px; color: rgba(255,255,255,0.6); text-align: center; padding: 0 30px; }

.progress-track {
  width: 240px; height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #45f3ff, #7b61ff);
  border-radius: 2px; transition: width 0.3s;
  width: 0%;
}

/* ── SUCCESS VIEW ── */
#successView {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.97);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px; z-index: 50;
}

.success-icon { font-size: 60px; margin-bottom: 12px; }
.success-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; color: #22c55e; }
.success-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 24px; text-align: center; }

.result-card {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
  padding: 16px; display: grid; gap: 10px;
  max-width: 380px; margin-bottom: 24px;
}

.result-row { display: flex; justify-content: space-between; align-items: center; }
.result-label { font-size: 12px; color: rgba(255,255,255,0.4); }
.result-val { font-size: 14px; font-weight: 600; color: #e8eaf6; text-align: left; }

.new-scan-btn {
  padding: 14px 40px; border-radius: 24px;
  background: linear-gradient(135deg, #45f3ff, #7b61ff);
  border: none; color: #000; font-size: 16px; font-weight: 800;
  cursor: pointer; font-family: inherit;
}

/* خطأ */
#errorView {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.97);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px; z-index: 50; gap: 16px;
}
.error-icon { font-size: 52px; }
.error-title { font-size: 20px; font-weight: 700; color: #ef4444; }
.error-msg { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; }
.retry-btn {
  padding: 12px 32px; border-radius: 20px;
  background: #ef4444; border: none; color: #fff;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<!-- ── SCANNER VIEW ── -->
<div id="scannerView">
  <div id="videoWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="grid" id="gridCanvas"></canvas>

    <!-- إطار اكتشاف المستند -->
    <div id="docFrame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>

    <div id="autoIndicator"></div>
    <div id="flashEffect"></div>

    <div id="topBar">
      <button id="closeBtn" onclick="goBack()">✕</button>
      <div id="topTitle">📷 مسح الجواز</div>
      <button id="flashBtn" onclick="toggleFlash()">⚡</button>
    </div>

    <div id="statusMsg" class="scanning">وجّه الكاميرا نحو الجواز</div>
  </div>

  <div id="bottomBar">
    <div id="galleryBtn" onclick="document.getElementById('galleryInput').click()">
      <img id="galleryPreview" alt="">
      <span id="galleryIcon">🖼</span>
      <input type="file" id="galleryInput" accept="image/*" style="display:none">
    </div>
    <button id="captureBtn" onclick="capture()"></button>
    <div style="width:54px"></div>
  </div>
</div>

<!-- ── REVIEW VIEW ── -->
<div id="reviewView">
  <div id="reviewHeader">
    <button id="retakeBtn" onclick="retake()">إعادة</button>
    <div id="reviewTitle">مراجعة الصورة</div>
    <button id="useBtn" onclick="sendImage()">إرسال ✓</button>
  </div>
  <div id="reviewImgWrap">
    <img id="reviewImg" alt="">
  </div>
  <div id="reviewFooter">تأكد أن الجواز واضح قبل الإرسال</div>
</div>

<!-- ── SENDING VIEW ── -->
<div id="sendingView">
  <div class="send-icon">🔬</div>
  <div class="send-title">جاري الاستخراج...</div>
  <div class="send-msg" id="sendMsg">يتم معالجة الصورة وقراءة البيانات</div>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
</div>

<!-- ── SUCCESS VIEW ── -->
<div id="successView">
  <div class="success-icon">✅</div>
  <div class="success-title">تم الاستخراج!</div>
  <div class="success-sub">تم إرسال البيانات للكمبيوتر تلقائياً</div>
  <div class="result-card" id="resultCard"></div>
  <button class="new-scan-btn" onclick="newScan()">📷 مسح جواز جديد</button>
</div>

<!-- ── ERROR VIEW ── -->
<div id="errorView">
  <div class="error-icon">❌</div>
  <div class="error-title">فشل الاستخراج</div>
  <div class="error-msg" id="errorMsg">حدث خطأ أثناء المعالجة</div>
  <button class="retry-btn" onclick="retake()">حاول مجدداً</button>
</div>

<script>
'use strict';

// ── الإعدادات ──
const API_BASE = localStorage.getItem('pai_api_base') || 'https://phd-considering-aaa-despite.trycloudflare.com';
const EXTRACT_URL = localStorage.getItem('pai_extract_url')
  || localStorage.getItem('pai_webhook')
  || `${API_BASE}/webhook/passport-extract1`;
const SID = (() => { let id = localStorage.getItem('pai_sid'); if (!id) { id = 'u' + Math.random().toString(36).slice(2,9); localStorage.setItem('pai_sid', id); } return id; })();

let stream = null;
let track = null;
let flashOn = false;
let capturedBlob = null;
let capturedDataUrl = null;
let autoDetecting = false;
let autoDetectTimer = null;
let detectionActive = false;

function ensureReachableWebhook(url) {
  if (window.location.protocol === 'https:' && /^http:\/\//i.test(url)) {
    throw new Error('رابط الويبهوك غير آمن HTTP بينما التطبيق مفتوح عبر HTTPS. لازم الويبهوك يكون HTTPS.');
  }
}

// ── بدء الكاميرا ──
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous',
      },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    video.onloadedmetadata = () => {
      video.play();
      drawGrid();
      startAutoDetect();
    };
  } catch(e) {
    showStatus('لا يمكن الوصول للكاميرا. تحقق من الإذن.');
  }
}

// ── شبكة المساعدة ──
function drawGrid() {
  const canvas = document.getElementById('grid');
  const wrap = document.getElementById('videoWrap');
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  // ثلاثة أثلاث
  for (let i = 1; i <= 2; i++) {
    ctx.beginPath(); ctx.moveTo(canvas.width * i/3, 0); ctx.lineTo(canvas.width * i/3, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, canvas.height * i/3); ctx.lineTo(canvas.width, canvas.height * i/3); ctx.stroke();
  }
}

// ── اكتشاف تلقائي بسيط (محاكاة) ──
function startAutoDetect() {
  detectionActive = true;
  let stable = 0;

  const check = () => {
    if (!detectionActive) return;

    // محاكاة اكتشاف مستند بناءً على الضوء والاستقرار
    const video = document.getElementById('video');
    const w = video.videoWidth, h = video.videoHeight;
    if (!w) { requestAnimationFrame(check); return; }

    const canvas = document.createElement('canvas');
    canvas.width = Math.min(w, 320);
    canvas.height = Math.min(h, 240);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let brightness = 0, edgeCount = 0;

    // حساب متوسط السطوع
    for (let i = 0; i < data.length; i += 16) {
      brightness += (data[i] + data[i+1] + data[i+2]) / 3;
    }
    brightness /= (data.length / 16);

    // حساب الحواف التقريبية
    for (let y = 1; y < canvas.height - 1; y += 3) {
      for (let x = 1; x < canvas.width - 1; x += 3) {
        const idx = (y * canvas.width + x) * 4;
        const idxR = (y * canvas.width + x + 1) * 4;
        const idxD = ((y+1) * canvas.width + x) * 4;
        const gx = Math.abs(data[idx] - data[idxR]);
        const gy = Math.abs(data[idx] - data[idxD]);
        if (gx + gy > 30) edgeCount++;
      }
    }

    const edgeRatio = edgeCount / (canvas.width * canvas.height / 9);
    const isDoc = brightness > 60 && brightness < 230 && edgeRatio > 0.04 && edgeRatio < 0.45;

    if (isDoc) {
      stable++;
      showDocFrame(true);
    } else {
      stable = 0;
      showDocFrame(false);
    }

    if (stable >= 8) {
      // مستند مستقر — التقاط تلقائي
      stable = 0;
      autoCapture();
    } else {
      setTimeout(check, 120);
    }
  };

  setTimeout(check, 500);
}

function showDocFrame(detected) {
  const frame = document.getElementById('docFrame');
  const msg = document.getElementById('statusMsg');
  const btn = document.getElementById('captureBtn');

  if (detected) {
    const wrap = document.getElementById('videoWrap');
    const pw = wrap.offsetWidth, ph = wrap.offsetHeight;
    const margin = 0.08;
    frame.style.cssText = `
      display: block;
      left: ${pw * margin}px;
      top: ${ph * 0.25}px;
      width: ${pw * (1 - margin*2)}px;
      height: ${ph * 0.5}px;
    `;
    frame.classList.add('detected');
    frame.querySelectorAll('.corner').forEach(c => c.style.color = '#22c55e');
    msg.textContent = '✅ تم اكتشاف الجواز';
    msg.className = 'detected';
    btn.classList.add('auto');
  } else {
    frame.classList.remove('detected');
    frame.querySelectorAll('.corner').forEach(c => c.style.color = 'rgba(69,243,255,0.9)');
    frame.style.display = 'none';
    msg.textContent = 'وجّه الكاميرا نحو الجواز';
    msg.className = 'scanning';
    btn.classList.remove('auto');
  }
}

function autoCapture() {
  // تأثير الاكتشاف التلقائي
  const ind = document.getElementById('autoIndicator');
  ind.style.display = 'block';
  setTimeout(() => { ind.style.display = 'none'; }, 600);
  capture();
}

// ── الالتقاط ──
async function capture() {
  detectionActive = false;
  const video = document.getElementById('video');
  const flash = document.getElementById('flashEffect');

  // تأثير الفلاش
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 100);

  // التقاط الصورة
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // تحسين الصورة
  enhanceImage(ctx, canvas.width, canvas.height);

  capturedDataUrl = canvas.toDataURL('image/jpeg', 0.95);

  canvas.toBlob(blob => {
    capturedBlob = blob;
    showReview();
  }, 'image/jpeg', 0.95);
}

function enhanceImage(ctx, w, h) {
  const d = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < d.data.length; i += 4) {
    d.data[i]   = Math.min(255, Math.max(0, ((d.data[i]   - 128) * 1.14) + 132));
    d.data[i+1] = Math.min(255, Math.max(0, ((d.data[i+1] - 128) * 1.14) + 132));
    d.data[i+2] = Math.min(255, Math.max(0, ((d.data[i+2] - 128) * 1.14) + 132));
  }
  ctx.putImageData(d, 0, 0);
}

// ── عرض المراجعة ──
function showReview() {
  stopCamera();
  document.getElementById('reviewImg').src = capturedDataUrl;
  document.getElementById('scannerView').style.display = 'none';
  document.getElementById('reviewView').style.display = 'flex';
}

function retake() {
  capturedBlob = null;
  capturedDataUrl = null;
  document.getElementById('reviewView').style.display = 'none';
  document.getElementById('sendingView').style.display = 'none';
  document.getElementById('successView').style.display = 'none';
  document.getElementById('errorView').style.display = 'none';
  document.getElementById('scannerView').style.display = 'flex';
  startCamera();
}

// ── إرسال الصورة ──
async function sendImage() {
  if (!capturedBlob) return;

  document.getElementById('reviewView').style.display = 'none';
  document.getElementById('sendingView').style.display = 'flex';
  setProgress(15);
  setSendMsg('جاري تجهيز الصورة...');

  try {
    setProgress(35);
    setSendMsg('جاري إرسال الصورة لاستخراج البيانات...');

    const fd = new FormData();
    fd.append('data', capturedBlob, 'passport-scan.jpg');
    fd.append('_sid', SID);

    ensureReachableWebhook(EXTRACT_URL);
    const res = await fetch(EXTRACT_URL, { method: 'POST', body: fd });
    setProgress(70);
    setSendMsg('جاري قراءة البيانات...');

    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch {
      const m = text.match(/\{[\s\S]*\}/);
      if (m) try { json = JSON.parse(m[0]); } catch {}
    }

    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (!json) throw new Error('لم يرجع بيانات');
    if (Array.isArray(json)) json = json[0] || {};
    if (json.data && typeof json.data === 'object') json = json.data;

    setProgress(100);
    setSendMsg('تم!');

    setTimeout(() => showSuccess(json), 300);

  } catch(e) {
    document.getElementById('sendingView').style.display = 'none';
    document.getElementById('errorMsg').textContent = e.message || 'حدث خطأ غير متوقع';
    document.getElementById('errorView').style.display = 'flex';
  }
}

function setProgress(p) { document.getElementById('progFill').style.width = p + '%'; }
function setSendMsg(m) { document.getElementById('sendMsg').textContent = m; }

function showSuccess(d) {
  document.getElementById('sendingView').style.display = 'none';

  const fields = [
    ['الاسم', d.nameEnglish],
    ['رقم الجواز', d.passportNumber || d.passportNo],
    ['الجنسية', d.nationalityArabic],
    ['تاريخ الميلاد', d.dateOfBirth],
    ['تاريخ الإصدار', d.dateOfIssue],
    ['تاريخ الانتهاء', d.dateOfExpiry],
    ['مكان الإصدار', d.placeOfIssueEnglishUpper || d.placeOfIssueArabic],
  ].filter(([,v]) => v && v !== 'null');

  document.getElementById('resultCard').innerHTML = fields.map(([l,v]) =>
    `<div class="result-row">
      <span class="result-label">${l}</span>
      <span class="result-val">${v}</span>
    </div>`
  ).join('');

  document.getElementById('successView').style.display = 'flex';
}

function newScan() {
  document.getElementById('successView').style.display = 'none';
  document.getElementById('scannerView').style.display = 'flex';
  capturedBlob = null;
  capturedDataUrl = null;
  startCamera();
}

// ── الفلاش ──
async function toggleFlash() {
  if (!track) return;
  flashOn = !flashOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: flashOn }] });
    document.getElementById('flashBtn').className = flashOn ? 'on' : '';
  } catch(e) {
    document.getElementById('flashBtn').style.opacity = '0.3';
  }
}

// ── رفع من الاستوديو ──
document.getElementById('galleryInput').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;

  const reader = new FileReader();
  reader.onload = async () => {
    capturedDataUrl = reader.result;

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const s = Math.min(1, 2200 / Math.max(img.width, img.height));
      canvas.width = Math.round(img.width * s);
      canvas.height = Math.round(img.height * s);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      enhanceImage(ctx, canvas.width, canvas.height);

      // تحديث preview الاستوديو
      const prev = document.getElementById('galleryPreview');
      prev.src = capturedDataUrl;
      prev.style.display = 'block';
      document.getElementById('galleryIcon').style.display = 'none';

      canvas.toBlob(blob => {
        capturedBlob = blob;
        capturedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('reviewImg').src = capturedDataUrl;
        showReview();
      }, 'image/jpeg', 0.95);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ── إيقاف الكاميرا ──
function stopCamera() {
  detectionActive = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ── رسالة حالة ──
function showStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusMsg').className = '';
}

// ── العودة ──
function goBack() {
  stopCamera();
  if (window.history.length > 1) window.history.back();
  else window.location.href = 'index.html';
}

// ── البدء ──
startCamera();

// إيقاف الكاميرا عند إخفاء الصفحة
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopCamera();
  else if (document.getElementById('scannerView').style.display !== 'none') startCamera();
});
</script>
