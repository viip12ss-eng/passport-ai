<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Passport AI">
<meta name="theme-color" content="#0a0b14">
<title>Passport AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b14; --surface: #111320; --border: rgba(255,255,255,0.08);
  --accent: #45f3ff; --purple: #7b61ff; --text: #e8eaf6; --dim: #6b7280;
  --green: #22c55e; --red: #ef4444;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; padding: calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 20px); }

/* ── Header ── */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.logo { font-size: 20px; font-weight: 900; }
.logo span { color: var(--accent); }
.badge { font-size: 11px; color: var(--accent); background: rgba(69,243,255,0.1); border: 1px solid rgba(69,243,255,0.25); border-radius: 20px; padding: 4px 10px; }

/* ── Mode Switch ── */
.mode-switch { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.mode-btn { border: 1px solid var(--border); border-radius: 14px; background: rgba(255,255,255,0.04); color: var(--text); padding: 12px 10px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; }
.mode-btn small { display: block; font-size: 10px; color: var(--dim); font-weight: 600; margin-top: 3px; }
.mode-btn.active { border-color: rgba(69,243,255,0.45); background: linear-gradient(135deg, rgba(69,243,255,0.14), rgba(123,97,255,0.18)); color: #fff; box-shadow: 0 8px 20px rgba(69,243,255,0.12); }

/* ── Webhook Bar ── */
.webhook-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; flex-shrink: 0; }
@keyframes blink { 50% { opacity: 0.3; } }
.webhook-url { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; direction: ltr; text-align: left; }

/* ── Owner Input Card ── */
.owner-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px; display: grid; gap: 10px; }
.owner-title { font-size: 12px; font-weight: 800; color: var(--accent); }
.field-label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; }
.field-input { width: 100%; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text); padding: 10px 12px; font-family: 'Cairo', sans-serif; font-size: 13px; }
.owner-hint { font-size: 11px; color: var(--dim); line-height: 1.7; }

/* ── Passport: Claim Row (hidden in doc mode) ── */
#claimRow { }

/* ── Passport: Action Grid ── */
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.action-btn { border-radius: 18px; padding: 20px 14px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; overflow: hidden; transition: transform .15s; }
.action-btn:active { transform: scale(0.96); }
.action-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.btn-camera  { background: linear-gradient(135deg, #1a1f3a, #252a48); border: 1px solid rgba(69,243,255,0.2); }
.btn-gallery { background: linear-gradient(135deg, #1f1a3a, #2a2048); border: 1px solid rgba(123,97,255,0.2); }
.btn-icon  { font-size: 34px; }
.btn-label { font-size: 14px; font-weight: 700; color: var(--text); }
.btn-sub   { font-size: 11px; color: var(--dim); }

/* ── Preview ── */
.preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 16px; display: none; }
.preview-card.show { display: block; }
.preview-img  { width: 100%; max-height: 220px; object-fit: contain; display: block; background: #000; }
.preview-info { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.preview-name { font-size: 12px; color: var(--dim); }
.preview-remove { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: 'Cairo', sans-serif; }

/* ── Send Btn ── */
.send-btn { width: 100%; border: none; border-radius: 18px; padding: 18px; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; background: linear-gradient(135deg, var(--purple), var(--accent)); color: #0a0b14; margin-bottom: 14px; transition: all .25s; box-shadow: 0 8px 30px rgba(69,243,255,0.2); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
.send-btn:not(:disabled):active { transform: scale(0.98); }

/* ── Status Box ── */
.status-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; display: none; }
.status-box.show    { display: block; }
.status-box.loading { border-color: rgba(69,243,255,0.2); }
.status-box.success { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
.status-box.error   { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
.status-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.status-msg   { font-size: 12px; color: var(--dim); line-height: 1.6; }
.progress     { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--purple), var(--accent)); border-radius: 2px; transition: width .4s; }

/* ── History ── */
.history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.history-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.history-title { font-size: 13px; font-weight: 700; }
.clear-btn  { font-size: 11px; color: var(--red); background: none; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; }
.history-body { padding: 8px 0; }
.history-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; }
.history-thumb { width: 44px; height: 32px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: #1a1f3a; display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; }
.history-name  { font-size: 12px; font-weight: 600; }
.history-date  { font-size: 11px; color: var(--dim); }
.history-badge { margin-right: auto; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.badge-ok   { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-fail { background: rgba(239,68,68,0.15); color: var(--red); }
.empty-hist { text-align: center; padding: 20px; font-size: 12px; color: var(--dim); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(10,11,20,0.3); border-top-color: #0a0b14; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════════
   DOCUMENT MODE — Field Cards
   ════════════════════════════════════════════ */
.doc-wrap { display: none; }
.doc-wrap.show { display: block; }

.doc-header {
  font-size: 12px; font-weight: 800; color: var(--accent);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  letter-spacing: 0.3px;
}

.doc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 14px;
  margin-bottom: 9px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.25s, background 0.25s;
  position: relative; overflow: hidden;
}
/* شريط جانبي ملوّن */
.doc-card::before {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: transparent; transition: background 0.25s;
}
.doc-card.sending             { border-color: rgba(69,243,255,0.45); }
.doc-card.sending::before     { background: var(--accent); }
.doc-card.done                { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.035); }
.doc-card.done::before        { background: var(--green); }
.doc-card.fail                { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.03); }
.doc-card.fail::before        { background: var(--red); }

.doc-num {
  width: 26px; height: 26px; flex-shrink: 0;
  border-radius: 8px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; color: var(--dim);
}

.doc-card-body { flex: 1; min-width: 0; }
.doc-card-name {
  font-size: 13px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.doc-card-status {
  font-size: 11px; color: var(--dim); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.doc-card-status.ok   { color: var(--green); }
.doc-card-status.err  { color: var(--red); }
.doc-card-status.wait { color: var(--accent); }

.doc-card-btns { display: flex; gap: 8px; flex-shrink: 0; }

.doc-btn {
  width: 44px; height: 44px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
  transition: transform 0.12s, background 0.12s;
  flex-shrink: 0; user-select: none;
}
.doc-btn:active    { transform: scale(0.86); background: rgba(255,255,255,0.13); }
.doc-btn.cam-btn   { border-color: rgba(69,243,255,0.25); }
.doc-btn.gal-btn   { border-color: rgba(123,97,255,0.25); }
.doc-btn input     { display: none; }

@keyframes doc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.doc-card.sending .doc-btn { animation: doc-pulse 0.85s infinite; pointer-events: none; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">Passport <span>AI</span></div>
    <div class="badge">OMN · ROP</div>
  </div>

  <!-- Mode Switch -->
  <div class="mode-switch">
    <button class="mode-btn active" id="passportModeBtn" type="button" onclick="setAppMode('passport')">
      الجواز<small>تعبئة البيانات</small>
    </button>
    <button class="mode-btn" id="documentModeBtn" type="button" onclick="setAppMode('document')">
      المستندات<small>مرفقات من الجوال</small>
    </button>
  </div>

  <!-- Webhook Bar -->
  <div class="webhook-bar">
    <div class="dot"></div>
    <div class="webhook-url" id="urlDisplay">mmnnm19991.app.n8n.cloud · doc-system</div>
  </div>

  <!-- Owner Card -->
  <div class="owner-card">
    <div class="owner-title" id="ownerTitle">ربط الجلسة</div>
    <label>
      <span class="field-label">معرف المشترك</span>
      <input class="field-input" id="ownerKeyInput" placeholder="مثال: alfarsi0">
    </label>
    <!-- رمز الصفحة (جواز فقط) -->
    <div id="claimRow">
      <label>
        <span class="field-label">رمز الصفحة</span>
        <input class="field-input" id="claimCodeInput" inputmode="numeric" maxlength="6" placeholder="مثال: 123456">
      </label>
    </div>
    <div class="owner-hint" id="ownerHint">
      استخدم نفس معرف المشترك الموجود في الكمبيوتر، ثم اكتب رمز الصفحة.
    </div>
  </div>

  <!-- ══ PASSPORT MODE ══ -->
  <div id="passportActions">
    <div class="action-grid">
      <div class="action-btn btn-camera" id="cameraAction" style="cursor:pointer">
        <span class="btn-icon">📷</span>
        <span class="btn-label">كاميرا</span>
        <span class="btn-sub">ماسح ضوئي</span>
      </div>
      <label class="action-btn btn-gallery">
        <input type="file" accept="image/*" id="galleryIn">
        <span class="btn-icon">🖼️</span>
        <span class="btn-label">استوديو</span>
        <span class="btn-sub">من المكتبة</span>
      </label>
    </div>

    <div class="preview-card" id="previewCard">
      <img class="preview-img" id="previewImg" src="" alt="">
      <div class="preview-info">
        <span class="preview-name" id="previewName">—</span>
        <button class="preview-remove" onclick="clearFile()">إزالة</button>
      </div>
    </div>

    <button class="send-btn" id="sendBtn" disabled onclick="send()">اختر صورة أولاً</button>

    <div class="status-box" id="statusBox">
      <div class="status-title" id="statusTitle"></div>
      <div class="status-msg"   id="statusMsg"></div>
      <div class="progress" id="progressWrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- ══ DOCUMENT MODE ══ -->
  <div class="doc-wrap" id="docWrap">
    <div class="doc-header">📎 المستندات المطلوبة — اضغط على الحقل لإرساله</div>
    <div id="docCardsList"></div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-head">
      <span class="history-title">السجل</span>
      <button class="clear-btn" onclick="clearHistory()">مسح الكل</button>
    </div>
    <div class="history-body" id="historyList">
      <div class="empty-hist">لا يوجد سجل</div>
    </div>
  </div>

</div><!-- /app -->

<script>
'use strict';

// ═══════════════════════════════════════
// الإعدادات
// ═══════════════════════════════════════

// حقول صفحة الشرطة (نفس الـ IDs في سكربت الكمبيوتر)
const DOC_FIELDS = [
  { id: 'CC8041AE-9685-30FD-E053-6F64260A27D1', label: 'عقد العمل',                     icon: '📄' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A02', label: 'صورة جواز السفر لصاحب الطلب',   icon: '🛂' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A03', label: 'صورة جواز السفر للملتحق به',     icon: '🛂' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A01', label: 'صورة شخصية لصاحب الطلب',        icon: '🤳' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A11', label: 'اثبات صلة قرابة',                icon: '👨‍👩‍👦' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A04', label: 'صورة بطاقة الإقامة للملتحق به', icon: '🪪' },
  { id: 'BB8FA3FE-286B-4253-AD7C-090F9B271A17', label: 'رسالة صاحب العمل (تعهد)',        icon: '📝' },
];

// رابط n8n - تجريبي حالياً
const N8N_DOC_URL = localStorage.getItem('pai_doc_url')
  || 'https://mmnnm19991.app.n8n.cloud/webhook-test/doc-system';

// جواز
const API_BASE    = localStorage.getItem('pai_api_base') || 'https://phd-considering-aaa-despite.trycloudflare.com';
const EXTRACT_URL = localStorage.getItem('pai_extract_url') || `${API_BASE}/webhook/passport-extract1`;

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
const ownerKeyInput  = document.getElementById('ownerKeyInput');
const claimCodeInput = document.getElementById('claimCodeInput');
let file = null, dataUrl = null, sending = false;
let appHistory = JSON.parse(localStorage.getItem('pai_hist') || '[]');
let appMode = localStorage.getItem('pai_mobile_mode') || 'passport';

ownerKeyInput.value  = localStorage.getItem('pai_owner_key')    || '';
claimCodeInput.value = sessionStorage.getItem('pai_claim_code') || '';
ownerKeyInput.addEventListener('input',  () => localStorage.setItem('pai_owner_key', ownerKeyInput.value.trim()));
claimCodeInput.addEventListener('input', () => sessionStorage.setItem('pai_claim_code', claimCodeInput.value.trim()));

document.getElementById('cameraAction').addEventListener('click', () => {
  window.location.href = `scanner.html?mode=${encodeURIComponent(appMode)}`;
});
document.getElementById('galleryIn').onchange = e => selectFile(e.target.files[0]);

buildDocCards();
renderHistory();
setAppMode(appMode);

// ═══════════════════════════════════════
// Mode Switch
// ═══════════════════════════════════════
function setAppMode(mode) {
  appMode = mode === 'document' ? 'document' : 'passport';
  localStorage.setItem('pai_mobile_mode', appMode);

  document.getElementById('passportModeBtn').classList.toggle('active', appMode === 'passport');
  document.getElementById('documentModeBtn').classList.toggle('active', appMode === 'document');

  const isDoc = appMode === 'document';
  document.getElementById('passportActions').style.display = isDoc ? 'none' : '';
  document.getElementById('claimRow').style.display        = isDoc ? 'none' : '';
  document.getElementById('docWrap').classList.toggle('show', isDoc);

  document.getElementById('ownerTitle').textContent = isDoc ? 'معرف المشترك' : 'ربط الجلسة';
  document.getElementById('ownerHint').textContent  = isDoc
    ? 'أدخل نفس معرف المشترك المضبوط في الكمبيوتر، ثم اضغط على الحقل المطلوب.'
    : 'استخدم نفس معرف المشترك الموجود في الكمبيوتر، ثم اكتب رمز الصفحة الذي يظهر بعد الضغط على جلب من الجوال.';
}

// ═══════════════════════════════════════
// Document Field Cards
// ═══════════════════════════════════════
function buildDocCards() {
  const list = document.getElementById('docCardsList');
  DOC_FIELDS.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.id = `dc-${f.id}`;
    card.innerHTML = `
      <div class="doc-num">${i + 1}</div>
      <div class="doc-card-body">
        <div class="doc-card-name">${f.label}</div>
        <div class="doc-card-status" id="ds-${f.id}">اضغط للتصوير أو الاختيار</div>
      </div>
      <div class="doc-card-btns">
        <div class="doc-btn cam-btn" id="cam-${f.id}" onclick="openCamera('${f.id}')">📷</div>
        <label class="doc-btn gal-btn">
          🖼️
          <input type="file" accept="image/*" onchange="handleFile('${f.id}', this)">
        </label>
      </div>`;
    list.appendChild(card);
  });
}

function openCamera(fieldId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
  inp.onchange = () => handleFile(fieldId, inp);
  inp.click();
}

async function handleFile(fieldId, inputEl) {
  const f = inputEl.files && inputEl.files[0];
  if (!f) return;

  const owner = ownerKeyInput.value.trim();
  if (!owner) {
    alert('⚠️ أدخل معرف المشترك أولاً');
    ownerKeyInput.focus();
    if (inputEl.value !== undefined) inputEl.value = '';
    return;
  }

  const field = DOC_FIELDS.find(d => d.id === fieldId);
  if (!field) return;

  setCardState(fieldId, 'sending', 'جاري تجهيز الصورة...');

  try {
    const blob   = await compressImage(f);
    const sizeKB = Math.round(blob.size / 1024);
    setCardState(fieldId, 'sending', `جاري الإرسال... (${sizeKB} KB)`);

    const base64  = await blobToBase64(blob);
    const payload = {
      _mode:         'attachment',
      _owner:        owner,
      _field_id:     fieldId,
      _field_label:  field.label,
      _ts:           Date.now(),
      fileName:      field.label + '.jpg',
      mimeType:      'image/jpeg',
      contentBase64: base64,
    };

    const res = await fetch(N8N_DOC_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    setCardState(fieldId, 'done', `✅ تم الإرسال (${sizeKB} KB)`);
    addHistory(field.icon + ' ' + field.label, null, true);

    // إعادة الحالة بعد 5 ثواني
    setTimeout(() => setCardState(fieldId, '', 'اضغط لإرسال صورة جديدة'), 5000);

  } catch (err) {
    setCardState(fieldId, 'fail', '❌ ' + err.message);
    addHistory(DOC_FIELDS.find(d => d.id === fieldId)?.label || fieldId, null, false);
  }

  if (inputEl.value !== undefined) inputEl.value = '';
}

function setCardState(fieldId, state, statusText) {
  const card   = document.getElementById(`dc-${fieldId}`);
  const status = document.getElementById(`ds-${fieldId}`);
  if (!card || !status) return;
  card.classList.remove('sending', 'done', 'fail');
  status.classList.remove('ok', 'err', 'wait');
  if (state === 'sending') { card.classList.add('sending'); status.classList.add('wait'); }
  else if (state === 'done') { card.classList.add('done'); status.classList.add('ok'); }
  else if (state === 'fail') { card.classList.add('fail'); status.classList.add('err'); }
  status.textContent = statusText;
}

// ═══════════════════════════════════════
// Image Processing
// ═══════════════════════════════════════
function compressImage(f) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h / w * MAX); w = MAX; }
          else        { w = Math.round(w / h * MAX); h = MAX; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        // تحسين
        const d = ctx.getImageData(0, 0, w, h);
        for (let i = 0; i < d.data.length; i += 4) {
          d.data[i]   = clamp((d.data[i]   - 128) * 1.12 + 130);
          d.data[i+1] = clamp((d.data[i+1] - 128) * 1.12 + 130);
          d.data[i+2] = clamp((d.data[i+2] - 128) * 1.12 + 130);
        }
        ctx.putImageData(d, 0, 0);
        // ضغط تدريجي ≤ 450KB
        const max = 450 * 1024;
        let q = 0.92;
        function tryBlob() {
          c.toBlob(blob => {
            if (!blob) return rej(new Error('blob failed'));
            if (blob.size <= max || q <= 0.2) return res(blob);
            q -= 0.1; tryBlob();
          }, 'image/jpeg', q);
        }
        tryBlob();
      };
      img.onerror = () => rej(new Error('image load failed'));
      img.src = reader.result;
    };
    reader.onerror = () => rej(new Error('file read failed'));
    reader.readAsDataURL(f);
  });
}

function clamp(v) { return Math.min(255, Math.max(0, Math.round(v))); }

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(String(r.result || '').split('base64,')[1] || '');
    r.onerror = () => reject(new Error('read failed'));
    r.readAsDataURL(blob);
  });
}

// ═══════════════════════════════════════
// Passport Mode (unchanged)
// ═══════════════════════════════════════
function ensureReachableWebhook(url) {
  if (window.location.protocol === 'https:' && /^http:\/\//i.test(url))
    throw new Error('رابط HTTP غير آمن مع HTTPS');
}
function selectFile(f) {
  if (!f) return;
  file = f;
  const r = new FileReader();
  r.onload = () => {
    dataUrl = r.result;
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewName').textContent = f.name.length > 28 ? f.name.slice(0,28)+'…' : f.name;
    document.getElementById('previewCard').classList.add('show');
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sendBtn').textContent = '🚀 إرسال واستخراج';
  };
  r.readAsDataURL(f);
}
function clearFile() {
  file = null; dataUrl = null;
  document.getElementById('previewCard').classList.remove('show');
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendBtn').textContent = 'اختر صورة أولاً';
  document.getElementById('galleryIn').value = '';
}
async function send() {
  if (!file || sending) return;
  const owner = ownerKeyInput.value.trim();
  const claim = claimCodeInput.value.trim();
  if (!owner) { showStatus('error','❌ يلزم المعرف','اكتب معرف المشترك أولاً.',0); ownerKeyInput.focus(); return; }
  if (!claim) { showStatus('error','❌ يلزم رمز الصفحة','اكتب رمز الصفحة الظاهر في الكمبيوتر.',0); claimCodeInput.focus(); return; }
  sending = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.innerHTML = 'جاري الإرسال... <span class="spinner"></span>';
  showStatus('loading','⏳ جاري الإرسال...','يتم رفع الصورة ومعالجتها',20);
  try {
    setProgress(30); setMsg('جاري تجهيز الصورة...');
    const blob = await compressImage(file);
    setProgress(50); setMsg('جاري الإرسال...');
    const fd = new FormData();
    fd.append('data', blob, file.name.replace(/\.[^.]+$/,'')+'-enhanced.jpg');
    fd.append('_owner', owner); fd.append('_claim', claim); fd.append('_source','mobile-app');
    ensureReachableWebhook(EXTRACT_URL);
    const res  = await fetch(EXTRACT_URL, { method:'POST', body:fd });
    setProgress(80);
    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch { const m = text.match(/\{[\s\S]*\}/); if(m) try{json=JSON.parse(m[0]);}catch{} }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (!json || typeof json !== 'object') throw new Error('لم يُرجع بيانات صحيحة');
    if (Array.isArray(json)) json = json[0] || {};
    if (json.data && typeof json.data === 'object') json = json.data;
    setProgress(100); showSuccess(json);
    addHistory(file.name, dataUrl, true);
  } catch(e) {
    showStatus('error','❌ فشل الإرسال', e.message||String(e), 0);
    addHistory(file.name, dataUrl, false);
  }
  sending = false; btn.disabled = false; btn.textContent = '🚀 إرسال واستخراج';
}
function showStatus(type,title,msg,prog) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box show ' + type;
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusMsg').textContent   = msg;
  document.getElementById('progressWrap').style.display = type==='loading'?'block':'none';
  setProgress(prog);
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function setProgress(p) { document.getElementById('progressBar').style.width = p+'%'; }
function setMsg(m) { document.getElementById('statusMsg').textContent = m; }
function showSuccess(d) {
  const rows = [['الاسم',d.nameEnglish||d.nameArabic],['رقم الجواز',d.passportNumber||d.passportNo],
    ['الجنسية',d.nationalityArabic],['تاريخ الميلاد',d.dateOfBirth],
    ['تاريخ الإصدار',d.dateOfIssue],['تاريخ الانتهاء',d.dateOfExpiry]
  ].filter(([,v])=>v&&v!=='null');
  const box = document.getElementById('statusBox');
  box.className = 'status-box show success';
  document.getElementById('statusTitle').textContent = '✅ تم الاستخراج وإرسال البيانات للكمبيوتر';
  document.getElementById('statusMsg').innerHTML = rows.map(([l,v])=>`<b>${l}:</b> ${v}`).join(' &nbsp;·&nbsp; ');
  document.getElementById('progressWrap').style.display = 'none';
}

// ═══════════════════════════════════════
// History
// ═══════════════════════════════════════
function addHistory(name, thumb, ok) {
  appHistory.unshift({ name, thumb, ok, ts: Date.now() });
  if (appHistory.length > 20) appHistory = appHistory.slice(0, 20);
  localStorage.setItem('pai_hist', JSON.stringify(appHistory));
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!appHistory.length) { el.innerHTML = '<div class="empty-hist">لا يوجد سجل</div>'; return; }
  el.innerHTML = appHistory.map(h => {
    const d = new Date(h.ts).toLocaleString('ar',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    const t = h.thumb
      ? `<img class="history-thumb" src="${h.thumb}" alt="" style="display:block">`
      : `<div class="history-thumb">📄</div>`;
    return `<div class="history-item">${t}<div><div class="history-name">${(h.name||'').slice(0,26)}</div><div class="history-date">${d}</div></div><span class="history-badge ${h.ok?'badge-ok':'badge-fail'}">${h.ok?'✓':'✗'}</span></div>`;
  }).join('');
}
function clearHistory() {
  appHistory = [];
  localStorage.removeItem('pai_hist');
  renderHistory();
}
