<script id="tailwind-config">
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "primary-fixed-dim":"#b2c5ff","secondary-container":"#b3c5fd",
        "on-primary-container":"#ccd8ff","inverse-surface":"#2d3133",
        "on-secondary":"#ffffff","on-secondary-container":"#3e5181",
        "surface-bright":"#f7f9fb","surface-variant":"#e0e3e5",
        "on-primary-fixed":"#001847","secondary-fixed-dim":"#b3c5fd",
        "primary-fixed":"#dae2ff","on-tertiary":"#ffffff",
        "surface":"#f7f9fb","on-primary":"#ffffff",
        "inverse-on-surface":"#eff1f3","secondary-fixed":"#dae2ff",
        "tertiary-container":"#a93802","surface-container-lowest":"#ffffff",
        "outline-variant":"#c3c6d6","background":"#f7f9fb",
        "inverse-primary":"#b2c5ff","on-surface":"#191c1e",
        "surface-container-high":"#e6e8ea","surface-container-low":"#f2f4f6",
        "on-surface-variant":"#424654","primary":"#0040a1",
        "on-primary-fixed-variant":"#0040a1","outline":"#737785",
        "surface-dim":"#d8dadc","secondary":"#4a5d8e",
        "tertiary":"#822800","on-error":"#ffffff",
        "on-background":"#191c1e","surface-tint":"#0056d2",
        "error":"#ba1a1a","surface-container":"#eceef0",
        "on-tertiary-container":"#ffcebd","surface-container-highest":"#e0e3e5",
        "tertiary-fixed":"#ffdbcf","error-container":"#ffdad6",
        "primary-container":"#0056d2"
      },
      borderRadius: {
        "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem",
        "2xl":"1rem","3xl":"1.5rem","full":"9999px"
      },
      fontFamily: {
        "headline":["Noto Sans Arabic","Manrope"],
        "body":["Noto Sans Arabic","Inter"],
        "label":["Noto Sans Arabic","Inter"]

}
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  display:inline-block; line-height:1; text-transform:none;
  letter-spacing:normal; word-wrap:normal; white-space:nowrap; direction:ltr;
}
.editorial-shadow { box-shadow: 0 8px 24px rgba(0,64,161,0.08); }
.glass-panel {
  background: rgba(247,249,251,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.card-uploading { animation: pulse-border 1.4s ease-in-out infinite; }
@keyframes pulse-border {
  0%,100% { box-shadow: 0 8px 24px rgba(0,64,161,0.08); }
  50% { box-shadow: 0 8px 24px rgba(0,86,210,0.3); }
}
.safe-top    { padding-top:    env(safe-area-inset-top,    44px); }
.safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
</style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen" style="padding-bottom:100px">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 glass-panel flex justify-between items-center px-6 py-3 safe-top">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings:'FILL' 1">menu_book</span>
    </div>
    <span class="font-headline font-extrabold text-lg text-on-surface tracking-tight">Sovereign</span>
  </div>
  <!-- حالة الاتصال -->
  <div id="connectionBadge" class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-surface-container text-xs font-bold text-on-surface-variant">
    <span class="w-2 h-2 rounded-full bg-surface-container-highest inline-block" id="connDot"></span>
    <span id="connLabel">غير متصل</span>
  </div>
</header>

<!-- Main -->
<main class="px-5 pt-24">

  <!-- الوضع: جواز / مستندات -->
  <div class="flex gap-2 mb-6">
    <button onclick="setMode('docs')" id="btnDocs"
      class="flex-1 py-3 rounded-3xl font-headline font-bold text-sm transition-all active:scale-95 bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg">
      المستندات
    </button>
    <button onclick="setMode('passport')" id="btnPassport"
      class="flex-1 py-3 rounded-3xl font-headline font-bold text-sm transition-all active:scale-95 bg-surface-container text-on-surface-variant">
      الجواز
    </button>
  </div>

  <!-- ═══ وضع المستندات ═══ -->
  <div id="docsView">

    <!-- بانر الانتظار -->
    <div id="waitingBanner" class="hidden mb-5 p-4 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-2xl animate-spin" style="animation-duration:2s">sync</span>
        <div>
          <p class="font-bold text-sm" id="waitingTitle">في انتظار المستند...</p>
          <p class="text-xs opacity-80 mt-0.5" id="waitingSlotName">—</p>
        </div>
        <button onclick="stopAll()" class="mr-auto w-8 h-8 rounded-full bg-white/20 flex items-center justify-center active:scale-90">
          <span class="material-symbols-outlined text-sm">close</span>
        </button>
      </div>
    </div>

    <!-- قائمة المستندات المطلوبة -->
    <section class="mb-8">
      <div class="flex justify-between items-end mb-4">
        <div>
          <h3 class="text-lg font-headline font-bold text-on-surface">المستندات المطلوبة</h3>
          <p class="text-[11px] text-on-surface-variant mt-0.5">Required Documents</p>
        </div>
      </div>
      <div class="space-y-3" id="requiredList"></div>
    </section>

    <!-- قائمة المستندات الاختيارية -->
    <section class="mb-8">
      <div class="mb-4">
        <h3 class="text-lg font-headline font-bold text-on-surface">المستندات الاختيارية</h3>
        <p class="text-[11px] text-on-surface-variant mt-0.5">Optional Documents</p>
      </div>
      <div class="space-y-3" id="optionalList"></div>
    </section>

  </div>

  <!-- ═══ وضع الجواز ═══ -->
  <div id="passportView" class="hidden">
    <!-- بطاقة الماسح -->
    <div class="bg-gradient-to-br from-primary to-primary-container p-6 rounded-3xl text-on-primary mb-6 relative overflow-hidden editorial-shadow">
      <div class="relative z-10">
        <span class="text-xs font-bold uppercase tracking-widest opacity-80">تعبئة تلقائية</span>
        <h2 class="text-2xl font-headline font-bold mt-1">مسح الجواز</h2>
        <p class="text-sm opacity-80 mt-2">صوّر الجواز واستخرج البيانات تلقائياً</p>
      </div>
      <div class="absolute -left-8 -bottom-8 w-36 h-36 bg-white/10 rounded-full blur-3xl"></div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-5">
      <button onclick="openCamera()" class="bg-surface-container-lowest p-6 rounded-3xl editorial-shadow flex flex-col items-center gap-3 active:scale-95 transition-all">
        <div class="w-12 h-12 rounded-2xl bg-secondary-container flex items-center justify-center text-primary">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">photo_camera</span>
        </div>
        <span class="font-headline font-bold text-sm text-on-surface">كاميرا</span>
      </button>
      <label class="bg-surface-container-lowest p-6 rounded-3xl editorial-shadow flex flex-col items-center gap-3 active:scale-95 transition-all cursor-pointer">
        <input type="file" accept="image/*" id="passportGallery" class="hidden">
        <div class="w-12 h-12 rounded-2xl bg-primary-fixed flex items-center justify-center text-primary">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">image</span>
        </div>
        <span class="font-headline font-bold text-sm text-on-surface">المكتبة</span>
      </label>
    </div>

    <!-- معاينة الجواز -->
    <div id="passportPreview" class="hidden bg-surface-container-lowest rounded-3xl overflow-hidden editorial-shadow mb-5">
      <img id="passportImg" class="w-full max-h-56 object-contain bg-black block" src="" alt="">
      <div class="p-4 flex justify-between items-center">
        <span class="text-xs text-on-surface-variant" id="passportFileName">—</span>
        <button onclick="clearPassport()" class="text-xs text-error font-bold">إزالة</button>
      </div>
    </div>

    <button id="passportSendBtn" disabled onclick="sendPassport()"
      class="w-full py-4 rounded-3xl font-headline font-bold text-base bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg disabled:opacity-40 disabled:shadow-none active:scale-98 transition-all">
      اختر صورة أولاً
    </button>

    <!-- نتيجة الاستخراج -->
    <div id="passportResult" class="hidden mt-5 bg-surface-container-lowest rounded-3xl p-5 editorial-shadow">
      <p class="font-headline font-bold text-sm mb-3 text-on-surface">البيانات المستخرجة</p>
      <div id="passportFields" class="space-y-2"></div>
    </div>
  </div>

  <!-- سجل الإرسال -->
  <section class="mt-4">
    <div class="flex justify-between items-center mb-3">
      <h3 class="text-base font-headline font-bold text-on-surface">السجل</h3>
      <button onclick="clearHistory()" class="text-xs text-error font-bold">مسح</button>
    </div>
    <div id="historyList" class="space-y-2">
      <p class="text-sm text-on-surface-variant text-center py-4">لا يوجد سجل</p>
    </div>
  </section>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 glass-panel flex justify-around items-center px-4 pb-safe pt-3 rounded-t-3xl safe-bottom"
     style="box-shadow:0 -8px 24px rgba(0,64,161,0.12);">
  <button onclick="setMode('docs')" id="navDocs" class="flex flex-col items-center gap-1 px-4 py-2 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">description</span>
    <span class="text-[11px] font-bold">المستندات</span>
  </button>
  <button onclick="setMode('passport')" id="navPassport" class="flex flex-col items-center gap-1 px-4 py-2 text-on-surface-variant">
    <span class="material-symbols-outlined">menu_book</span>
    <span class="text-[11px] font-medium">الجواز</span>
  </button>
</nav>

<!-- Hidden file inputs for document slots -->
<div id="hiddenInputs" class="hidden"></div>

<script>
'use strict';

/* ─── Config ─── */
const API_BASE  = localStorage.getItem('pai_api_base')  || 'https://phd-considering-aaa-despite.trycloudflare.com';
const STORE_URL = localStorage.getItem('pai_store_url') || `${API_BASE}/webhook/passport-store`;
const EXTRACT_URL = localStorage.getItem('pai_extract_url') || `${API_BASE}/webhook/passport-extract1`;

/* ─── المستندات المطلوبة (مطابقة لترتيب الكمبيوتر) ─── */
const REQUIRED_DOCS = [
  { slot:1, ar:'عقد العمل',                       en:'Employment Contract',        icon:'work'          },
  { slot:2, ar:'صورة جواز السفر لصاحب الطلب',     en:'Passport Copy (Applicant)',  icon:'credit_card'   },
  { slot:3, ar:'صورة جواز السفر للمتلحق به',       en:'Passport Copy (Dependent)',  icon:'credit_card'   },
  { slot:4, ar:'صورة شخصية لصاحب الطلب',          en:'Personal Photo (Applicant)', icon:'account_circle'},
  { slot:5, ar:'إثبات صلة قرابة',                  en:'Proof of Relationship',      icon:'family_history'},
  { slot:6, ar:'صورة بطاقة الإقامة للمتلحق به',    en:'Residence Card (Dependent)', icon:'badge'         },
  { slot:7, ar:'رسالة صاحب العمل (تعهد)',           en:'Employer\'s Letter',         icon:'business'      },
];

const OPTIONAL_DOCS = [
  { slot:101, ar:'مستندات اختيارية 1', en:'Optional Document 1', icon:'attach_file' },
  { slot:102, ar:'مستندات اختيارية 2', en:'Optional Document 2', icon:'attach_file' },
  { slot:103, ar:'مستندات اختيارية 3', en:'Optional Document 3', icon:'attach_file' },
  { slot:104, ar:'مستندات اختيارية 4', en:'Optional Document 4', icon:'attach_file' },
  { slot:105, ar:'مستندات اختيارية 5', en:'Optional Document 5', icon:'attach_file' },
  { slot:106, ar:'مستندات اختيارية 6', en:'Optional Document 6', icon:'attach_file' },
];

/* ─── State ─── */
let appMode = localStorage.getItem('pai_mode') || 'docs';
let slotStatus = {}; // slot -> 'idle'|'uploading'|'sent'|'error'
let passportFile = null, passportDataUrl = null, sending = false;
let history = JSON.parse(localStorage.getItem('pai_hist') || '[]');

/* ─── Init ─── */
renderDocumentList(REQUIRED_DOCS, 'requiredList');
renderDocumentList(OPTIONAL_DOCS, 'optionalList');
setMode(appMode);
renderHistory();
document.getElementById('passportGallery').onchange = e => selectPassportFile(e.target.files[0]);

/* ─── Mode switch ─── */
function setMode(mode) {
  appMode = mode;
  localStorage.setItem('pai_mode', mode);
  document.getElementById('docsView').classList.toggle('hidden', mode !== 'docs');
  document.getElementById('passportView').classList.toggle('hidden', mode !== 'passport');
  // top btns
  document.getElementById('btnDocs').className    = 'flex-1 py-3 rounded-3xl font-headline font-bold text-sm transition-all active:scale-95 ' + (mode==='docs' ? 'bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg' : 'bg-surface-container text-on-surface-variant');
  document.getElementById('btnPassport').className = 'flex-1 py-3 rounded-3xl font-headline font-bold text-sm transition-all active:scale-95 ' + (mode==='passport' ? 'bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg' : 'bg-surface-container text-on-surface-variant');
  // nav
  const navBase = 'flex flex-col items-center gap-1 px-4 py-2 ';
  document.getElementById('navDocs').className    = navBase + (mode==='docs'     ? 'rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary' : 'text-on-surface-variant');
  document.getElementById('navPassport').className = navBase + (mode==='passport' ? 'rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary' : 'text-on-surface-variant');
}

/* ─── بناء قائمة المستندات ─── */
function renderDocumentList(docs, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = docs.map(doc => `
    <div class="bg-surface-container-lowest p-4 rounded-2xl editorial-shadow border border-outline-variant/20 flex items-center gap-3" id="card_${doc.slot}">
      <!-- أزرار الرفع -->
      <div class="flex flex-col gap-1.5 shrink-0">
        <button onclick="uploadSlot(${doc.slot},'camera')"
          class="w-10 h-10 rounded-xl bg-surface-container hover:bg-secondary-container active:scale-90 transition-all text-primary flex items-center justify-center"
          id="camBtn_${doc.slot}" title="تصوير">
          <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1">photo_camera</span>
        </button>
        <label class="w-10 h-10 rounded-xl bg-surface-container hover:bg-surface-container-high active:scale-90 transition-all text-primary flex items-center justify-center cursor-pointer"
          id="galLabel_${doc.slot}" title="اختيار من المكتبة">
          <input type="file" accept="image/*" class="hidden" id="galInput_${doc.slot}"
            onchange="handleGallerySelect(${doc.slot}, this)">
          <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1">image</span>
        </label>
      </div>
      <!-- معلومات -->
      <div class="flex-1 min-w-0">
        <div class="flex justify-between items-start gap-2">
          <h4 class="text-sm font-bold text-on-surface leading-tight">${doc.ar}</h4>
          <span id="badge_${doc.slot}" class="text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0 bg-surface-container-high text-on-surface-variant">
            جاهز
          </span>
        </div>
        <p class="text-[11px] text-on-surface-variant mt-0.5 truncate">${doc.en}</p>
      </div>
      <!-- أيقونة -->
      <div class="w-9 h-9 rounded-xl bg-primary-container/10 flex items-center justify-center text-primary shrink-0">
        <span class="material-symbols-outlined text-lg">${doc.icon}</span>
      </div>
    </div>
  `).join('');
}

/* ─── رفع من الكاميرا (scanner) ─── */
function uploadSlot(slot, source) {
  if (source === 'camera') {
    sessionStorage.setItem('pai_pending_slot', slot);
    window.location.href = `scanner.html?mode=document`;
  }
}

/* ─── اختيار من المعرض ─── */
function handleGallerySelect(slot, input) {
  const f = input.files[0];
  if (!f) return;
  input.value = '';
  sendDocumentSlot(slot, f);
}

/* ─── إرسال مستند بـ slot ─── */
async function sendDocumentSlot(slot, file) {
  setSlotStatus(slot, 'uploading');
  showWaitingBanner(slot);

  try {
    const blob = await processImage(file);
    const base64 = await blobToBase64(blob);

    const allDocs = [...REQUIRED_DOCS, ...OPTIONAL_DOCS];
    const doc = allDocs.find(d => d.slot === slot);

    const payload = {
      _mode:      'attachment',
      _slot:      slot,
      _docName:   doc?.ar || '',
      _source:    'sovereign-mobile',
      _ts:        Date.now(),
      fileName:   file.name.replace(/\.[^.]+$/, '') + `-slot${slot}.jpg`,
      mimeType:   'image/jpeg',
      contentBase64: base64
    };

    const res = await fetch(STORE_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    setSlotStatus(slot, 'sent');
    hideWaitingBanner();
    addHistory(doc?.ar || `Slot ${slot}`, true);

  } catch(e) {
    setSlotStatus(slot, 'error');
    hideWaitingBanner();
    addHistory(`Slot ${slot}`, false);
  }

  // reset after 6s
  setTimeout(() => setSlotStatus(slot, 'idle'), 6000);
}

/* ─── حالة البطاقة ─── */
function setSlotStatus(slot, status) {
  slotStatus[slot] = status;
  const card  = document.getElementById('card_' + slot);
  const badge = document.getElementById('badge_' + slot);
  if (!card || !badge) return;

  card.classList.remove('card-uploading');

  const states = {
    idle:      { text:'جاهز',       cls:'bg-surface-container-high text-on-surface-variant' },
    uploading: { text:'جاري الرفع…', cls:'bg-primary-fixed text-primary' },
    sent:      { text:'✓ تم الإرسال', cls:'bg-green-100 text-green-700' },
    error:     { text:'✗ فشل',       cls:'bg-error-container text-error' },
  };

  const s = states[status] || states.idle;
  badge.textContent = s.text;
  badge.className = `text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0 ${s.cls}`;
  if (status === 'uploading') card.classList.add('card-uploading');
}

/* ─── بانر الانتظار ─── */
function showWaitingBanner(slot) {
  const allDocs = [...REQUIRED_DOCS, ...OPTIONAL_DOCS];
  const doc = allDocs.find(d => d.slot === slot);
  document.getElementById('waitingSlotName').textContent = doc?.ar || `Slot ${slot}`;
  document.getElementById('waitingBanner').classList.remove('hidden');
}
function hideWaitingBanner() {
  document.getElementById('waitingBanner').classList.add('hidden');
}
function stopAll() {
  hideWaitingBanner();
  Object.keys(slotStatus).forEach(s => { if(slotStatus[s]==='uploading') setSlotStatus(Number(s),'idle'); });
}

/* ─── وضع الجواز ─── */
function openCamera() {
  sessionStorage.setItem('pai_pending_slot', 'passport');
  window.location.href = 'scanner.html?mode=passport';
}

function selectPassportFile(f) {
  if (!f) return;
  passportFile = f;
  const r = new FileReader();
  r.onload = () => {
    passportDataUrl = r.result;
    document.getElementById('passportImg').src = passportDataUrl;
    document.getElementById('passportFileName').textContent = f.name.slice(0,30);
    document.getElementById('passportPreview').classList.remove('hidden');
    const btn = document.getElementById('passportSendBtn');
    btn.disabled = false;
    btn.textContent = '🚀 إرسال واستخراج';
  };
  r.readAsDataURL(f);
}

function clearPassport() {
  passportFile = null; passportDataUrl = null;
  document.getElementById('passportPreview').classList.add('hidden');
  document.getElementById('passportResult').classList.add('hidden');
  document.getElementById('passportSendBtn').disabled = true;
  document.getElementById('passportSendBtn').textContent = 'اختر صورة أولاً';
}

async function sendPassport() {
  if (!passportFile || sending) return;
  sending = true;
  const btn = document.getElementById('passportSendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="inline-block animate-spin mr-2">⏳</span> جاري الإرسال...';

  try {
    const blob = await processImage(passportFile);
    const fd = new FormData();
    fd.append('data', blob, passportFile.name.replace(/\.[^.]+$/, '') + '-enhanced.jpg');
    fd.append('_source', 'sovereign-mobile');

    const res = await fetch(EXTRACT_URL, { method:'POST', body:fd });
    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch { const m=text.match(/\{[\s\S]*\}/); if(m) try{json=JSON.parse(m[0]);}catch{} }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (Array.isArray(json)) json = json[0]||{};
    if (json?.data && typeof json.data==='object') json = json.data;

    showPassportResult(json);
    addHistory(passportFile.name, true);

  } catch(e) {
    document.getElementById('passportResult').classList.remove('hidden');
    document.getElementById('passportFields').innerHTML = `<p class="text-sm text-error">${e.message}</p>`;
    addHistory(passportFile.name, false);
  }

  sending = false;
  btn.disabled = false;
  btn.textContent = '🚀 إرسال واستخراج';
}

function showPassportResult(d) {
  const fields = [
    ['الاسم',         d.nameEnglish||d.nameArabic],
    ['رقم الجواز',    d.passportNumber||d.passportNo],
    ['الجنسية',       d.nationalityArabic],
    ['تاريخ الميلاد', d.dateOfBirth],
    ['تاريخ الانتهاء',d.dateOfExpiry],
  ].filter(([,v]) => v && v !== 'null');

  const el = document.getElementById('passportResult');
  el.classList.remove('hidden');
  document.getElementById('passportFields').innerHTML = fields.map(([l,v]) =>
    `<div class="flex justify-between py-1.5 border-b border-outline-variant/20 last:border-0">
      <span class="text-xs text-on-surface-variant">${l}</span>
      <span class="text-xs font-bold text-on-surface">${v}</span>
    </div>`
  ).join('') || '<p class="text-sm text-on-surface-variant">لا توجد بيانات</p>';
}

/* ─── اتصال (Scanner callback) ─── */
window.addEventListener('load', () => {
  const slot = sessionStorage.getItem('pai_pending_slot');
  const img  = sessionStorage.getItem('pai_scanned_image');
  const name = sessionStorage.getItem('pai_scanned_name') || 'scanned.jpg';
  if (slot && img) {
    sessionStorage.removeItem('pai_pending_slot');
    sessionStorage.removeItem('pai_scanned_image');
    sessionStorage.removeItem('pai_scanned_name');
    fetch(img).then(r=>r.blob()).then(blob => {
      const file = new File([blob], name, {type:'image/jpeg'});
      if (slot === 'passport') selectPassportFile(file);
      else sendDocumentSlot(Number(slot), file);
    });
  }
});

/* ─── معالجة الصورة ─── */
async function processImage(f) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const s = Math.min(1, 2200/Math.max(img.width,img.height));
        const w=Math.round(img.width*s), h=Math.round(img.height*s);
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
        const d=ctx.getImageData(0,0,w,h);
        for(let i=0;i<d.data.length;i+=4){
          d.data[i]=Math.min(255,Math.max(0,((d.data[i]-128)*1.12)+130));
          d.data[i+1]=Math.min(255,Math.max(0,((d.data[i+1]-128)*1.12)+130));
          d.data[i+2]=Math.min(255,Math.max(0,((d.data[i+2]-128)*1.12)+130));
        }
        ctx.putImageData(d,0,0);
        c.toBlob(b=>b?res(b):rej(new Error('blob')),'image/jpeg',0.92);
      };
      img.onerror=()=>rej(new Error('img load'));
      img.src=reader.result;
    };
    reader.onerror=()=>rej(new Error('file read'));
    reader.readAsDataURL(f);
  });
}

async function blobToBase64(blob) {
  return new Promise((res,rej) => {
    const r=new FileReader();
    r.onload=()=>res(String(r.result||'').split('base64,')[1]||'');
    r.onerror=()=>rej(new Error('read'));
    r.readAsDataURL(blob);
  });
}

/* ─── Connection badge ─── */
(async function checkConn() {
  const dot   = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  try {
    const r = await fetch(API_BASE + '/healthz', {method:'HEAD', cache:'no-store', signal:AbortSignal.timeout(3000)});
    if (r.ok || r.status < 500) {
      dot.className   = 'w-2 h-2 rounded-full bg-green-500 inline-block';
      label.textContent = 'متصل';
      document.getElementById('connectionBadge').className = 'flex items-center gap-1.5 px-3 py-1 rounded-full bg-green-50 text-xs font-bold text-green-700';
    } else { throw new Error(); }
  } catch {
    dot.className   = 'w-2 h-2 rounded-full bg-on-surface-variant inline-block opacity-40';
    label.textContent = 'غير متصل';
  }
})();

/* ─── History ─── */
function addHistory(name, ok) {
  history.unshift({name, ok, ts:Date.now()});
  if(history.length>20) history=history.slice(0,20);
  localStorage.setItem('pai_hist', JSON.stringify(history));
  renderHistory();
}
function clearHistory() {
  history=[];
  localStorage.removeItem('pai_hist');
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if(!history.length){ el.innerHTML='<p class="text-sm text-on-surface-variant text-center py-4">لا يوجد سجل</p>'; return; }
  el.innerHTML = history.map(h => {
    const d = new Date(h.ts).toLocaleString('ar',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    return `<div class="bg-surface-container-lowest rounded-xl px-4 py-2.5 flex items-center gap-3 editorial-shadow">
      <div class="flex-1">
        <p class="text-xs font-bold text-on-surface truncate">${(h.name||'').slice(0,30)}</p>
        <p class="text-[11px] text-on-surface-variant">${d}</p>
      </div>
      <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${h.ok?'bg-green-100 text-green-700':'bg-error-container text-error'}">${h.ok?'✓ نجح':'✗ فشل'}</span>
    </div>`;
  }).join('');
}
